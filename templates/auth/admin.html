<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>审批管理 - 围棋智能助手</title>
    <link rel="icon" type="image/x-icon" href="{{ base_path }}/assets/favicon/favicon.ico?v=20260502">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 30px 25px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .icon {
            font-size: 50px;
            text-align: center;
            margin-bottom: 15px;
        }
        
        h1 {
            text-align: center;
            font-size: 1.4em;
            margin-bottom: 25px;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 0.9em;
        }
        
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            background: white;
            cursor: pointer;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        
        .btn-approve {
            background: #27ae60;
            color: white;
        }
        
        .btn-reject {
            background: #e74c3c;
            color: white;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        
        .btn-group .btn {
            flex: 1;
        }
        
        .info-box {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
        }
        
        .info-box.show {
            display: block;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.95em;
        }
        
        .info-row:last-child {
            margin-bottom: 0;
        }
        
        .label {
            color: #666;
        }
        
        .value {
            color: #333;
            font-weight: 500;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 500;
        }
        
        .status-pending {
            background: #fff3cd;
            color: #856404;
        }
        
        .status-approved {
            background: #d4edda;
            color: #155724;
        }
        
        .status-rejected {
            background: #f8d7da;
            color: #721c24;
        }
        
        .message-box {
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.95em;
        }
        
        .message-success {
            background: #e8f5e9;
            color: #27ae60;
        }
        
        .message-error {
            background: #ffebee;
            color: #c62828;
        }
        
        .message-info {
            background: #e3f2fd;
            color: #1565c0;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🔐</div>
        <h1>审批管理</h1>
        
        <!-- 申请码输入 -->
        <div class="form-group">
            <label for="applyCode">申请码</label>
            <input type="text" id="applyCode" placeholder="输入申请码" maxlength="4" autocomplete="off">
        </div>
        
        <!-- Token有效期 -->
        <div class="form-group">
            <label for="expireDays">Token有效期</label>
            <select id="expireDays">
                <option value="0.042" selected>1 小时（默认，临时体验）</option>
                <option value="1">1 天（比赛期间）</option>
                <option value="3">3 天（比赛期间）</option>
                <option value="30">30 天（长期使用）</option>
            </select>
        </div>
        
        <!-- 密码输入（密码缓存1天，失效时显示） -->
        <div id="passwordGroup" class="form-group hidden">
            <label for="adminPassword">管理员密码</label>
            <input type="password" id="adminPassword" placeholder="输入管理员密码">
        </div>
        
        <!-- 操作按钮 -->
        <div class="btn-group">
            <button class="btn btn-approve" id="approveBtn" onclick="approveApply()">✅ 同意</button>
            <button class="btn btn-reject" id="rejectBtn" onclick="rejectApply()">❌ 拒绝</button>
        </div>
        
        <!-- 申请信息（点击同意/拒绝后显示） -->
        <div id="infoBox" class="info-box">
            <div class="info-row">
                <span class="label">申请码</span>
                <span class="value" id="infoCode">-</span>
            </div>
            <div class="info-row">
                <span class="label">提交时间</span>
                <span class="value" id="infoTime">-</span>
            </div>
            <div class="info-row">
                <span class="label">状态</span>
                <span class="value" id="infoStatus">-</span>
            </div>
        </div>
        
        <!-- 消息提示 -->
        <div id="messageBox" class="message-box hidden"></div>
    </div>
    
    <script>
        // 动态获取 API 域名
        const DOMAIN_JS_URL = 'https://weiqi-dev.github.io/weiqi-assets/js/domain.js';
        const DOMAIN_CACHE_KEY = 'weiqi_api_domain';
        const DOMAIN_CACHE_TIME_KEY = 'weiqi_api_domain_time';
        const PASSWORD_CACHE_KEY = 'weiqi_admin_password';
        const PASSWORD_CACHE_TIME_KEY = 'weiqi_admin_password_time';
        const CACHE_MAX_AGE = 10 * 60 * 1000;
        const PASSWORD_CACHE_AGE = 24 * 60 * 60 * 1000; // 1天
        
        let apiBase = '';
        let cachedPassword = '';
        let needPassword = false; // 是否需要用户输入密码
        
        async function getApiBase() {
            if (window.API_BASE) return window.API_BASE;
            
            const cached = localStorage.getItem(DOMAIN_CACHE_KEY);
            const cachedTime = parseInt(localStorage.getItem(DOMAIN_CACHE_TIME_KEY) || '0');
            const now = Date.now();
            
            if (cached && (now - cachedTime) < CACHE_MAX_AGE) {
                return cached;
            }
            
            try {
                await loadScript(DOMAIN_JS_URL + '?v=' + now);
                if (window.API_BASE) {
                    localStorage.setItem(DOMAIN_CACHE_KEY, window.API_BASE);
                    localStorage.setItem(DOMAIN_CACHE_TIME_KEY, now.toString());
                    return window.API_BASE;
                }
            } catch (e) {
                console.warn('加载域名配置失败:', e);
            }
            
            if (cached) return cached;
            throw new Error('无法获取 API 域名');
        }
        
        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = src;
                script.crossOrigin = 'anonymous';
                script.onload = () => resolve();
                script.onerror = () => reject(new Error('Failed to load: ' + src));
                document.head.appendChild(script);
            });
        }
        
        // 显示消息
        function showMessage(msg, type) {
            const box = document.getElementById('messageBox');
            box.textContent = msg;
            box.className = `message-box message-${type}`;
        }
        
        // 显示申请信息
        function showInfo(data) {
            document.getElementById('infoCode').textContent = data.code;
            
            const createdAt = new Date(data.created_at);
            document.getElementById('infoTime').textContent = 
                createdAt.toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'});
            
            const statusEl = document.getElementById('infoStatus');
            let statusText = '';
            let statusClass = '';
            
            switch(data.status) {
                case 'pending':
                    statusText = '等待审核';
                    statusClass = 'status-pending';
                    break;
                case 'approved':
                    statusText = '已批准';
                    statusClass = 'status-approved';
                    break;
                case 'rejected':
                    statusText = '已拒绝';
                    statusClass = 'status-rejected';
                    break;
            }
            
            statusEl.innerHTML = `<span class="status-badge ${statusClass}">${statusText}</span>`;
            document.getElementById('infoBox').classList.add('show');
        }
        
        // 获取密码
        function getPassword() {
            // 如果已经标记需要密码，从输入框获取
            if (needPassword) {
                return document.getElementById('adminPassword').value;
            }
            
            // 否则使用缓存密码
            return cachedPassword;
        }
        
        // 缓存密码
        function cachePassword(password) {
            localStorage.setItem(PASSWORD_CACHE_KEY, password);
            localStorage.setItem(PASSWORD_CACHE_TIME_KEY, Date.now().toString());
            cachedPassword = password;
            needPassword = false;
        }
        
        // 清除密码缓存
        function clearPasswordCache() {
            localStorage.removeItem(PASSWORD_CACHE_KEY);
            localStorage.removeItem(PASSWORD_CACHE_TIME_KEY);
            cachedPassword = '';
            needPassword = true;
            document.getElementById('passwordGroup').classList.remove('hidden');
            document.getElementById('adminPassword').focus();
        }
        
        // 页面加载
        window.onload = async function() {
            try {
                apiBase = await getApiBase();
                
                // 检查密码缓存
                const cached = localStorage.getItem(PASSWORD_CACHE_KEY);
                const cachedTime = parseInt(localStorage.getItem(PASSWORD_CACHE_TIME_KEY) || '0');
                const now = Date.now();
                
                if (cached && (now - cachedTime) < PASSWORD_CACHE_AGE) {
                    // 密码缓存有效，记住密码
                    cachedPassword = cached;
                    needPassword = false;
                    // 不显示密码输入框
                    document.getElementById('passwordGroup').classList.add('hidden');
                } else {
                    // 密码缓存失效，清空
                    localStorage.removeItem(PASSWORD_CACHE_KEY);
                    localStorage.removeItem(PASSWORD_CACHE_TIME_KEY);
                    cachedPassword = '';
                    needPassword = true;
                    // 显示密码输入框
                    document.getElementById('passwordGroup').classList.remove('hidden');
                }
            } catch (e) {
                showMessage('网络错误: ' + e.message, 'error');
            }
        };
        
        // 同意申请
        async function approveApply() {
            const code = document.getElementById('applyCode').value.trim();
            
            if (!code) {
                showMessage('请输入申请码', 'error');
                return;
            }
            
            const password = getPassword();
            
            if (!password) {
                showMessage('请输入管理员密码', 'error');
                clearPasswordCache();
                return;
            }
            
            const expireDays = parseFloat(document.getElementById('expireDays').value);
            
            // 禁用按钮
            document.getElementById('approveBtn').disabled = true;
            document.getElementById('rejectBtn').disabled = true;
            
            try {
                const res = await fetch(`${apiBase}/api/admin/apply/approve`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({code: code, password: password, expire_days: expireDays})
                });
                
                const data = await res.json();
                
                if (data.success) {
                    // 缓存密码
                    cachePassword(password);
                    
                    // 隐藏密码输入框
                    document.getElementById('passwordGroup').classList.add('hidden');
                    
                    // 显示申请信息
                    showInfo({
                        code: code,
                        created_at: new Date().toISOString(),
                        status: 'approved'
                    });
                    
                    showMessage('✅ 已批准，用户可正常访问', 'success');
                } else {
                    // 密码错误，清除缓存，显示密码输入框
                    if (data.error.message.includes('密码')) {
                        clearPasswordCache();
                    }
                    
                    showMessage(data.error.message, 'error');
                }
            } catch (e) {
                showMessage('网络错误: ' + e.message, 'error');
            } finally {
                // 恢复按钮
                document.getElementById('approveBtn').disabled = false;
                document.getElementById('rejectBtn').disabled = false;
            }
        }
        
        // 拒绝申请
        async function rejectApply() {
            const code = document.getElementById('applyCode').value.trim();
            
            if (!code) {
                showMessage('请输入申请码', 'error');
                return;
            }
            
            const password = getPassword();
            
            if (!password) {
                showMessage('请输入管理员密码', 'error');
                clearPasswordCache();
                return;
            }
            
            // 禁用按钮
            document.getElementById('approveBtn').disabled = true;
            document.getElementById('rejectBtn').disabled = true;
            
            try {
                const res = await fetch(`${apiBase}/api/admin/apply/reject`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({code: code, password: password})
                });
                
                const data = await res.json();
                
                if (data.success) {
                    // 缓存密码
                    cachePassword(password);
                    
                    // 隐藏密码输入框
                    document.getElementById('passwordGroup').classList.add('hidden');
                    
                    // 显示申请信息
                    showInfo({
                        code: code,
                        created_at: new Date().toISOString(),
                        status: 'rejected'
                    });
                    
                    showMessage('已拒绝', 'info');
                } else {
                    // 密码错误，清除缓存，显示密码输入框
                    if (data.error.message.includes('密码')) {
                        clearPasswordCache();
                    }
                    
                    showMessage(data.error.message, 'error');
                }
            } catch (e) {
                showMessage('网络错误: ' + e.message, 'error');
            } finally {
                // 恢复按钮
                document.getElementById('approveBtn').disabled = false;
                document.getElementById('rejectBtn').disabled = false;
            }
        }
    </script>
</body>
</html>
