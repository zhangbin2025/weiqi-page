<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>审批管理 - 围棋智能助手</title>
    <link rel="icon" type="image/x-icon" href="{{ base_path }}/assets/favicon/favicon.ico?v=20260502">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 30px 25px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .icon {
            font-size: 50px;
            text-align: center;
            margin-bottom: 15px;
        }
        
        h1 {
            text-align: center;
            font-size: 1.4em;
            margin-bottom: 25px;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 0.9em;
        }
        
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 500;
            transition: opacity 0.2s;
        }
        
        .btn:hover {
            opacity: 0.9;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-approve {
            background: #27ae60;
            color: white;
        }
        
        .btn-reject {
            background: #e74c3c;
            color: white;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .result-box {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        
        .result-box.show {
            display: block;
        }
        
        .result-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.95em;
        }
        
        .result-row:last-child {
            margin-bottom: 0;
        }
        
        .label {
            color: #666;
        }
        
        .value {
            color: #333;
            font-weight: 500;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 500;
        }
        
        .status-pending {
            background: #fff3cd;
            color: #856404;
        }
        
        .status-approved {
            background: #d4edda;
            color: #155724;
        }
        
        .status-rejected {
            background: #f8d7da;
            color: #721c24;
        }
        
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        
        .btn-group .btn {
            flex: 1;
        }
        
        .error-msg {
            color: #e74c3c;
            font-size: 0.85em;
            margin-top: 10px;
            text-align: center;
        }
        
        .success-msg {
            color: #27ae60;
            font-size: 0.95em;
            text-align: center;
            padding: 10px;
            background: #e8f5e9;
            border-radius: 8px;
            margin-top: 10px;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-top: 10px;
        }
        
        .checkbox-group input[type="checkbox"] {
            margin-right: 8px;
        }
        
        .checkbox-group label {
            margin-bottom: 0;
            font-size: 0.85em;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🔐</div>
        <h1>审批管理</h1>
        
        <!-- 查询表单 -->
        <div class="form-group">
            <label for="applyCode">申请码</label>
            <input type="text" id="applyCode" placeholder="输入申请码" maxlength="4">
        </div>
        
        <div class="form-group">
            <label for="adminPassword">管理员密码</label>
            <input type="password" id="adminPassword" placeholder="输入管理员密码">
            <div class="checkbox-group">
                <input type="checkbox" id="rememberPassword">
                <label for="rememberPassword">记住密码（30分钟）</label>
            </div>
        </div>
        
        <div class="form-group">
            <label for="expireDays">Token有效期</label>
            <select id="expireDays" style="width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px;">
                <option value="0.042" selected>1 小时（默认，临时体验）</option>
                <option value="1">1 天（比赛期间）</option>
                <option value="3">3 天（比赛期间）</option>
                <option value="30">30 天（长期使用）</option>
            </select>
        </div>
        
        <button class="btn btn-primary" onclick="queryApply()">查询</button>
        
        <!-- 查询结果 -->
        <div class="result-box" id="resultBox">
            <div class="result-row">
                <span class="label">申请码</span>
                <span class="value" id="resultCode">-</span>
            </div>
            <div class="result-row">
                <span class="label">提交时间</span>
                <span class="value" id="resultTime">-</span>
            </div>
            <div class="result-row">
                <span class="label">状态</span>
                <span class="value" id="resultStatus">-</span>
            </div>
            
            <!-- 审批按钮 -->
            <div class="btn-group" id="actionButtons" style="display: none;">
                <button class="btn btn-approve" onclick="approveApply()">✅ 同意</button>
                <button class="btn btn-reject" onclick="rejectApply()">❌ 拒绝</button>
            </div>
        </div>
        
        <div id="errorMsg" class="error-msg" style="display: none;"></div>
        <div id="successMsg" class="success-msg" style="display: none;"></div>
    </div>
    
    <script>
        // 动态获取 API 域名
        const DOMAIN_JS_URL = 'https://weiqi-dev.github.io/weiqi-assets/js/domain.js';
        const DOMAIN_CACHE_KEY = 'weiqi_api_domain';
        const DOMAIN_CACHE_TIME_KEY = 'weiqi_api_domain_time';
        const PASSWORD_CACHE_KEY = 'weiqi_admin_password';
        const PASSWORD_CACHE_TIME_KEY = 'weiqi_admin_password_time';
        const CACHE_MAX_AGE = 10 * 60 * 1000;
        const PASSWORD_CACHE_AGE = 30 * 60 * 1000; // 30分钟
        
        let apiBase = '';
        
        async function getApiBase() {
            if (window.API_BASE) return window.API_BASE;
            
            const cached = localStorage.getItem(DOMAIN_CACHE_KEY);
            const cachedTime = parseInt(localStorage.getItem(DOMAIN_CACHE_TIME_KEY) || '0');
            const now = Date.now();
            
            if (cached && (now - cachedTime) < CACHE_MAX_AGE) {
                return cached;
            }
            
            try {
                await loadScript(DOMAIN_JS_URL + '?v=' + now);
                if (window.API_BASE) {
                    localStorage.setItem(DOMAIN_CACHE_KEY, window.API_BASE);
                    localStorage.setItem(DOMAIN_CACHE_TIME_KEY, now.toString());
                    return window.API_BASE;
                }
            } catch (e) {
                console.warn('加载域名配置失败:', e);
            }
            
            if (cached) return cached;
            throw new Error('无法获取 API 域名');
        }
        
        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = src;
                script.crossOrigin = 'anonymous';
                script.onload = () => resolve();
                script.onerror = () => reject(new Error('Failed to load: ' + src));
                document.head.appendChild(script);
            });
        }
        
        // 页面加载
        window.onload = async function() {
            try {
                apiBase = await getApiBase();
                
                // 恢复缓存的密码
                const cachedPassword = localStorage.getItem(PASSWORD_CACHE_KEY);
                const passwordTime = parseInt(localStorage.getItem(PASSWORD_CACHE_TIME_KEY) || '0');
                const now = Date.now();
                
                if (cachedPassword && (now - passwordTime) < PASSWORD_CACHE_AGE) {
                    document.getElementById('adminPassword').value = cachedPassword;
                    document.getElementById('rememberPassword').checked = true;
                }
            } catch (e) {
                showError('网络错误: ' + e.message);
            }
        };
        
        // 查询申请
        async function queryApply() {
            const code = document.getElementById('applyCode').value.trim();
            const password = document.getElementById('adminPassword').value;
            
            if (!code) {
                showError('请输入申请码');
                return;
            }
            
            if (!password) {
                showError('请输入管理员密码');
                return;
            }
            
            // 缓存密码
            if (document.getElementById('rememberPassword').checked) {
                localStorage.setItem(PASSWORD_CACHE_KEY, password);
                localStorage.setItem(PASSWORD_CACHE_TIME_KEY, Date.now().toString());
            } else {
                localStorage.removeItem(PASSWORD_CACHE_KEY);
                localStorage.removeItem(PASSWORD_CACHE_TIME_KEY);
            }
            
            try {
                const res = await fetch(`${apiBase}/api/auth/apply/${code}`);
                const data = await res.json();
                
                if (data.success) {
                    showResult(data.data, password);
                } else {
                    showError(data.error.message);
                }
            } catch (e) {
                showError('网络错误: ' + e.message);
            }
        }
        
        // 显示查询结果
        function showResult(applyData, password) {
            const resultBox = document.getElementById('resultBox');
            const actionButtons = document.getElementById('actionButtons');
            
            document.getElementById('resultCode').textContent = applyData.code;
            
            const createdAt = new Date(applyData.created_at);
            document.getElementById('resultTime').textContent = 
                createdAt.toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'});
            
            // 状态显示
            const statusEl = document.getElementById('resultStatus');
            let statusText = '';
            let statusClass = '';
            
            switch(applyData.status) {
                case 'pending':
                    statusText = '等待审核';
                    statusClass = 'status-pending';
                    break;
                case 'approved':
                    statusText = '已批准';
                    statusClass = 'status-approved';
                    break;
                case 'rejected':
                    statusText = '已拒绝';
                    statusClass = 'status-rejected';
                    break;
                case 'expired':
                    statusText = '已过期';
                    statusClass = 'status-rejected';
                    break;
            }
            
            statusEl.innerHTML = `<span class="status-badge ${statusClass}">${statusText}</span>`;
            
            // 显示审批按钮（仅pending状态）
            if (applyData.status === 'pending') {
                actionButtons.style.display = 'flex';
            } else {
                actionButtons.style.display = 'none';
            }
            
            resultBox.classList.add('show');
            hideMessages();
        }
        
        // 批准申请
        async function approveApply() {
            const code = document.getElementById('applyCode').value.trim();
            const password = document.getElementById('adminPassword').value;
            const expireDaysStr = document.getElementById('expireDays').value;
            const expireDays = parseFloat(expireDaysStr);  // 转换为数字
            
            try {
                const res = await fetch(`${apiBase}/api/admin/apply/approve`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({code: code, password: password, expire_days: expireDays})
                });
                
                const data = await res.json();
                
                if (data.success) {
                    showSuccess('✅ 已批准，用户可正常访问');
                    document.getElementById('actionButtons').style.display = 'none';
                    document.getElementById('resultStatus').innerHTML = 
                        '<span class="status-badge status-approved">已批准</span>';
                } else {
                    showError(data.error.message);
                }
            } catch (e) {
                showError('网络错误: ' + e.message);
            }
        }
        
        // 拒绝申请
        async function rejectApply() {
            if (!confirm('确定拒绝该申请？')) return;
            
            const code = document.getElementById('applyCode').value.trim();
            const password = document.getElementById('adminPassword').value;
            
            try {
                const res = await fetch(`${apiBase}/api/admin/apply/reject`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({code: code, password: password})
                });
                
                const data = await res.json();
                
                if (data.success) {
                    showSuccess('已拒绝');
                    document.getElementById('actionButtons').style.display = 'none';
                    document.getElementById('resultStatus').innerHTML = 
                        '<span class="status-badge status-rejected">已拒绝</span>';
                } else {
                    showError(data.error.message);
                }
            } catch (e) {
                showError('网络错误: ' + e.message);
            }
        }
        
        function showError(msg) {
            const errorEl = document.getElementById('errorMsg');
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
            document.getElementById('successMsg').style.display = 'none';
        }
        
        function showSuccess(msg) {
            const successEl = document.getElementById('successMsg');
            successEl.textContent = msg;
            successEl.style.display = 'block';
            document.getElementById('errorMsg').style.display = 'none';
        }
        
        function hideMessages() {
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('successMsg').style.display = 'none';
        }
    </script>
</body>
</html>
