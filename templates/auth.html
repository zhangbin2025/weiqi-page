<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>身份认证 - 围棋智能助手</title>
    <link rel="icon" type="image/x-icon" href="{{ base_path }}/assets/favicon/favicon.ico?v=20260502">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .auth-card {
            background: white;
            border-radius: 16px;
            padding: 30px 25px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .auth-icon {
            font-size: 60px;
            text-align: center;
            margin-bottom: 15px;
        }
        
        h1 {
            text-align: center;
            font-size: 1.4em;
            margin-bottom: 8px;
            color: #333;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
            font-size: 0.85em;
        }
        
        .apply-code-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            text-align: center;
        }
        
        .apply-label {
            color: rgba(255,255,255,0.8);
            font-size: 0.85em;
            margin-bottom: 8px;
        }
        
        .apply-code {
            font-size: 2.5em;
            font-weight: bold;
            color: white;
            letter-spacing: 8px;
        }
        
        .step {
            margin-bottom: 20px;
        }
        
        .step-header {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .step-number {
            width: 28px;
            height: 28px;
            background: #667eea;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            margin-right: 10px;
        }
        
        .step-title {
            font-weight: 500;
            color: #333;
            font-size: 0.95em;
        }
        
        .step-content {
            color: #666;
            font-size: 0.85em;
            line-height: 1.6;
            margin-left: 38px;
        }
        
        .qr-code {
            margin: 15px 0;
            text-align: left;
        }
        
        .qr-code img {
            max-width: 120px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .status {
            text-align: center;
            padding: 15px;
            background: #fff3cd;
            border-radius: 8px;
            margin-top: 20px;
        }
        
        .status.waiting {
            background: #fff3cd;
            color: #856404;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #856404;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-icon">🔐</div>
        <h1>身份认证</h1>
        <p class="subtitle">请按以下步骤完成认证</p>
        
        <!-- 申请码 -->
        <div class="apply-code-box">
            <div class="apply-label">申请码</div>
            <div class="apply-code" id="applyCode">----</div>
        </div>
        
        <!-- 步骤1 -->
        <div class="step">
            <div class="step-header">
                <div class="step-number">1</div>
                <div class="step-title">扫码关注公众号</div>
            </div>
            <div class="step-content">
                <div class="qr-code">
                    <img src="{{base_path}}/assets/images/public.jpg" alt="公众号二维码" onerror="this.style.display='none'">
                </div>
            </div>
        </div>
        
        <!-- 步骤2 -->
        <div class="step">
            <div class="step-header">
                <div class="step-number">2</div>
                <div class="step-title">发送申请码</div>
            </div>
            <div class="step-content">
                在公众号发送：<strong id="applyText">----</strong>
            </div>
        </div>
        
        <!-- 状态提示 -->
        <div class="status waiting" id="statusBox">
            <span class="loading"></span>
            <span id="statusText">等待审核中...</span>
        </div>
    </div>
    
    <script>
        // 动态获取 base_path
        function getBasePath() {
            const path = window.location.pathname;
            const match = path.match(/^(\/[^/]+\/weiqi-page|\/weiqi-page)/);
            return match ? match[1] : '/weiqi-page';
        }
        
        // 动态获取 API 域名
        const DOMAIN_JS_URL = 'https://weiqi-dev.github.io/weiqi-assets/js/domain.js';
        const DOMAIN_CACHE_KEY = 'weiqi_api_domain';
        const DOMAIN_CACHE_TIME_KEY = 'weiqi_api_domain_time';
        const CACHE_MAX_AGE = 10 * 60 * 1000;
        
        async function getApiBase() {
            if (window.API_BASE) return window.API_BASE;
            
            const cached = localStorage.getItem(DOMAIN_CACHE_KEY);
            const cachedTime = parseInt(localStorage.getItem(DOMAIN_CACHE_TIME_KEY) || '0');
            const now = Date.now();
            
            if (cached && (now - cachedTime) < CACHE_MAX_AGE) {
                return cached;
            }
            
            try {
                await loadScript(DOMAIN_JS_URL + '?v=' + now);
                if (window.API_BASE) {
                    localStorage.setItem(DOMAIN_CACHE_KEY, window.API_BASE);
                    localStorage.setItem(DOMAIN_CACHE_TIME_KEY, now.toString());
                    return window.API_BASE;
                }
            } catch (e) {
                console.warn('加载域名配置失败:', e);
            }
            
            if (cached) return cached;
            throw new Error('无法获取 API 域名');
        }
        
        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = src;
                script.crossOrigin = 'anonymous';
                script.onload = () => resolve();
                script.onerror = () => reject(new Error('Failed to load: ' + src));
                document.head.appendChild(script);
            });
        }
        
        // 全局变量
        let applyCode = '';
        let apiBase = '';
        let returnUrl = '/';
        
        // 页面加载
        window.onload = async function() {
            // 获取返回URL
            const urlParams = new URLSearchParams(window.location.search);
            returnUrl = urlParams.get('return') || '/';
            
            try {
                // 获取API域名
                apiBase = await getApiBase();
                
                // 检查是否已有有效 token
                const cachedToken = localStorage.getItem('weiqi_token');
                if (cachedToken) {
                    // 验证 token 是否有效
                    try {
                        const verifyRes = await fetch(`${apiBase}/api/auth/verify`, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({token: cachedToken})
                        });
                        const verifyData = await verifyRes.json();
                        
                        if (verifyData.success && verifyData.data.valid) {
                            // Token 有效，直接跳转
                            window.location.replace(decodeURIComponent(returnUrl));
                            return; // 不继续执行后续代码
                        } else {
                            // Token 无效，清除缓存
                            localStorage.removeItem('weiqi_token');
                        }
                    } catch (e) {
                        // 验证失败，继续走申请流程
                        console.warn('Token验证失败:', e);
                    }
                }
                
                // 创建申请记录
                const res = await fetch(`${apiBase}/api/auth/apply`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({return_url: returnUrl})
                });
                
                const data = await res.json();
                
                if (data.success) {
                    applyCode = data.data.code;
                    
                    // 显示申请码
                    document.getElementById('applyCode').textContent = applyCode;
                    document.getElementById('applyText').textContent = applyCode;
                    
                    // 开始轮询状态
                    pollStatus();
                } else {
                    showError('创建申请失败: ' + data.error.message);
                }
            } catch (e) {
                showError('网络错误: ' + e.message);
            }
        };
        
        // 轮询状态
        async function pollStatus() {
            try {
                const res = await fetch(`${apiBase}/api/auth/apply/${applyCode}`);
                const data = await res.json();
                
                if (!data.success) {
                    // 申请码不存在或已过期，自动刷新
                    const errorMsg = data.error?.message || '申请码已失效';
                    showRefreshing(errorMsg);
                    setTimeout(() => refreshApplyCode(), 2000);
                    return;
                }
                
                const status = data.data.status;
                
                if (status === 'approved') {
                    showSuccess();
                    return;
                } else if (status === 'rejected') {
                    showError('申请被拒绝，请联系管理员');
                    return;
                } else if (status === 'expired') {
                    showRefreshing('申请已过期');
                    setTimeout(() => refreshApplyCode(), 2000);
                    return;
                }
            } catch (e) {
                console.error('轮询失败:', e);
                // 网络错误，继续轮询
            }
            
            // 继续轮询
            setTimeout(pollStatus, 3000);
        }
        
        // 显示成功
        function showSuccess() {
            const statusBox = document.getElementById('statusBox');
            statusBox.className = 'status success';
            statusBox.innerHTML = '✅ 认证成功，正在跳转...';
            
            // 重新获取完整的申请信息（包含token）
            fetch(`${apiBase}/api/auth/apply/${applyCode}`)
                .then(res => res.json())
                .then(data => {
                    if (data.success && data.data.token) {
                        localStorage.setItem('weiqi_token', data.data.token);
                    }
                    setTimeout(() => {
                        // 使用 replace 跳转，不留历史记录
                        window.location.replace(decodeURIComponent(returnUrl));
                    }, 1500);
                });
        }
        
        // 显示刷新中
        function showRefreshing(msg) {
            const statusBox = document.getElementById('statusBox');
            statusBox.className = 'status waiting';
            statusBox.innerHTML = `⏳ ${msg}，正在重新申请...`;
        }
        
        // 刷新申请码
        async function refreshApplyCode() {
            try {
                const res = await fetch(`${apiBase}/api/auth/apply`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({return_url: returnUrl})
                });
                
                const data = await res.json();
                
                if (data.success) {
                    applyCode = data.data.code;
                    
                    // 更新页面显示
                    document.getElementById('applyCode').textContent = applyCode;
                    document.getElementById('applyText').textContent = applyCode;
                    
                    // 恢复等待状态
                    const statusBox = document.getElementById('statusBox');
                    statusBox.className = 'status waiting';
                    statusBox.innerHTML = '<span class="loading"></span><span id="statusText">等待审核中...</span>';
                    
                    // 继续轮询
                    pollStatus();
                } else {
                    showError('重新申请失败: ' + data.error.message);
                }
            } catch (e) {
                showError('网络错误: ' + e.message);
            }
        }
        
        // 显示错误
        function showError(msg) {
            const statusBox = document.getElementById('statusBox');
            statusBox.className = 'status error';
            statusBox.innerHTML = '❌ ' + msg;
        }
    </script>
</body>
</html>
