<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云比赛 - 围棋智能助手</title>
    <link rel="icon" type="image/x-icon" href="/weiqi-page/assets/favicon/favicon.ico">
    <script src="/weiqi-page/assets/js/auth.js?v={{GIT_HASH}}"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 12px;
            min-height: 100vh;
        }
        
        /* 头部 */
        header {
            padding: 12px 10px;
            color: white;
            text-align: center;
        }
        
        h1 { 
            font-size: 1.6em; 
            margin-bottom: 4px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .subtitle {
            font-size: 0.85em;
            opacity: 0.9;
        }
        
        /* 返回按钮 */
        .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 12px;
            font-size: 0.9em;
        }
        
        .back-btn:hover {
            background: rgba(255,255,255,0.3);
        }
        
        /* 卡片通用样式 */
        .card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .card h2 {
            font-size: 1.1em;
            margin-bottom: 12px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        /* 输入框 */
        input[type="text"], select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
            margin-bottom: 12px;
        }
        
        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        /* 按钮 */
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
            width: 100%;
        }
        
        button:hover {
            opacity: 0.9;
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        button.secondary {
            background: #f5f5f5;
            color: #333;
            border: 1px solid #ddd;
        }
        
        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 40px 20px;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 错误提示 */
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }
        
        /* 比赛卡片 */
        .event-card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .event-card:hover {
            transform: translateY(-2px);
        }
        
        .event-title {
            font-weight: 600;
            font-size: 1.1em;
            color: #333;
            margin-bottom: 8px;
        }
        
        .event-meta {
            display: flex;
            gap: 16px;
            color: #666;
            font-size: 0.9em;
        }
        
        .event-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .event-status {
            font-size: 0.75em;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 8px;
        }
        
        .event-status.ended {
            background: #e8f5e9;
            color: #4caf50;
        }
        
        .event-status.ongoing {
            background: #fff3e0;
            color: #ff9800;
        }
        
        /* 筛选标签栏 */
        .filter-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            overflow-x: auto;
        }
        
        .filter-tab {
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 0.9em;
            white-space: nowrap;
        }
        
        .filter-tab.active {
            background: white;
            color: #667eea;
        }
        
        /* 最近访问标签 */
        .visited-tag {
            background: rgba(255,255,255,0.25);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8em;
            cursor: pointer;
            white-space: nowrap;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .visited-tag:hover {
            background: rgba(255,255,255,0.4);
        }
        
        /* 分组卡片 */
        .group-card {
            background: #e3f2fd;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .group-card:hover {
            transform: translateY(-2px);
        }
        
        .group-name {
            font-weight: 600;
            font-size: 1.1em;
            color: #1976d2;
        }
        
        .group-players {
            color: #666;
            font-size: 0.9em;
            margin-top: 4px;
        }
        
        /* 标签页 */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .tab {
            flex: 1;
            padding: 12px;
            background: #f5f5f5;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95em;
            color: #666;
        }
        
        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        /* 排名表格 */
        .ranking-card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .ranking-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .ranking-title {
            font-weight: 600;
            color: #333;
        }
        
        .ranking-mode {
            display: flex;
            gap: 8px;
        }
        
        .ranking-mode button {
            padding: 6px 12px;
            font-size: 0.85em;
            width: auto;
        }
        
        .ranking-mode button.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        /* 排名表格 */
        .ranking-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }
        
        .ranking-table th {
            background: #f5f5f5;
            padding: 10px 6px;
            text-align: center;
            font-weight: 600;
            color: #666;
            font-size: 0.85em;
        }
        
        .ranking-table td {
            padding: 10px 6px;
            border-bottom: 1px solid #f0f0f0;
            text-align: center;
        }
        
        .ranking-table tr:last-child td {
            border-bottom: none;
        }
        
        .ranking-table .rank-num {
            font-weight: 600;
            color: #667eea;
        }
        
        .ranking-table .rank-num.top3 {
            color: #ff9800;
        }
        
        .ranking-table .rank-name {
            text-align: left;
            font-weight: 500;
        }
        
        .ranking-table .rank-team {
            font-size: 0.8em;
            color: #888;
        }
        
        .ranking-table .rank-score {
            font-weight: 600;
            color: #333;
        }
        
        /* 对阵卡片 */
        .match-card {
            background: white;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .match-round {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .match-players {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .match-player {
            text-align: center;
            flex: 1;
        }
        
        .match-player.black::before {
            content: "⚫";
            display: block;
            font-size: 0.8em;
        }
        
        .match-player.white::before {
            content: "⚪";
            display: block;
            font-size: 0.8em;
        }
        
        .match-vs {
            color: #888;
            padding: 0 12px;
        }
        
        .match-result {
            font-size: 0.85em;
            color: #4caf50;
            font-weight: 500;
        }
        
        /* 轮次导航 */
        .round-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 12px;
            background: white;
            border-radius: 12px;
            margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .round-nav button {
            width: 40px;
            height: 40px;
            padding: 0;
            border-radius: 50%;
            font-size: 1.2em;
        }
        
        .round-nav button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        .round-info {
            font-weight: 600;
            color: #333;
            min-width: 80px;
            text-align: center;
        }
        
        /* 查询时间 */
        .query-time {
            text-align: center;
            color: #888;
            font-size: 0.8em;
            margin-top: 8px;
        }
        
        /* 未找到提示 */
        .not-found {
            text-align: center;
            padding: 24px;
            color: #888;
        }
        
        .not-found-icon {
            font-size: 2em;
            margin-bottom: 8px;
        }
        
        /* 页脚 */
        footer {
            text-align: center;
            padding: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 0.7em;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏆 云比赛</h1>
            <p class="subtitle">查询云比赛网围棋赛事</p>
        </header>
        
        <!-- 查询输入 -->
        <div id="querySection">
            <div class="card">
                <h2>🔍 查询比赛</h2>
                <select id="areaSelect">
                    <option value="">全国</option>
                    <option value="北京市">北京市</option>
                    <option value="天津市">天津市</option>
                    <option value="河北省">河北省</option>
                    <option value="山西省">山西省</option>
                    <option value="内蒙古自治区">内蒙古自治区</option>
                    <option value="辽宁省">辽宁省</option>
                    <option value="吉林省">吉林省</option>
                    <option value="黑龙江省">黑龙江省</option>
                    <option value="上海市">上海市</option>
                    <option value="江苏省">江苏省</option>
                    <option value="浙江省">浙江省</option>
                    <option value="安徽省">安徽省</option>
                    <option value="福建省">福建省</option>
                    <option value="江西省">江西省</option>
                    <option value="山东省">山东省</option>
                    <option value="河南省">河南省</option>
                    <option value="湖北省">湖北省</option>
                    <option value="湖南省">湖南省</option>
                    <option value="广东省" selected>广东省</option>
                    <option value="广西壮族自治区">广西壮族自治区</option>
                    <option value="海南省">海南省</option>
                    <option value="重庆市">重庆市</option>
                    <option value="四川省">四川省</option>
                    <option value="贵州省">贵州省</option>
                    <option value="云南省">云南省</option>
                    <option value="西藏自治区">西藏自治区</option>
                    <option value="陕西省">陕西省</option>
                    <option value="甘肃省">甘肃省</option>
                    <option value="青海省">青海省</option>
                    <option value="宁夏回族自治区">宁夏回族自治区</option>
                    <option value="新疆维吾尔自治区">新疆维吾尔自治区</option>
                </select>
                <select id="monthSelect">
                    <option value="1">最近1个月</option>
                    <option value="3" selected>最近3个月</option>
                    <option value="6">最近半年</option>
                    <option value="12">最近1年</option>
                    <option value="24">全部</option>
                </select>
                <input type="text" id="keywordInput" placeholder="关键词（可选）">
                <button onclick="queryEvents()" id="queryBtn">开始查询</button>
            </div>
        </div>
        
        <!-- 比赛列表 -->
        <div id="eventsSection" style="display: none;">
            <button class="back-btn" onclick="backToQuery()">← 返回查询</button>
            <div class="filter-tabs">
                <button class="filter-tab active" onclick="filterEvents('all')" id="filterAll">全部</button>
                <button class="filter-tab" onclick="filterEvents('ongoing')" id="filterOngoing">未结束</button>
                <button class="filter-tab" onclick="filterEvents('ended')" id="filterEnded">已结束</button>
            </div>
            <div id="recentQueries" style="margin-bottom: 12px;"></div>
            <div id="eventsList"></div>
        </div>
        
        <!-- 分组列表 -->
        <div id="groupsSection" style="display: none;">
            <button class="back-btn" onclick="backToEvents()">← 返回比赛</button>
            <div id="groupsList"></div>
        </div>
        
        <!-- 分组详情（排名/对阵） -->
        <div id="groupDetailSection" style="display: none;">
            <button class="back-btn" onclick="backToGroups()">← 返回分组</button>
            
            <!-- 标签页 -->
            <div class="tabs">
                <button class="tab active" onclick="switchTab('ranking')" id="rankingTab">📊 排名</button>
                <button class="tab" onclick="switchTab('matches')" id="matchesTab">⚔️ 对阵</button>
            </div>
            
            <!-- 排名内容 -->
            <div id="rankingContent">
                <div class="ranking-card">
                    <div class="ranking-header">
                        <span class="ranking-title">当前排名</span>
                        <div class="ranking-mode">
                            <button class="active" onclick="setRankingMode('default')" id="modeDefault">默认</button>
                            <button onclick="setRankingMode('simple')" id="modeSimple">简单</button>
                        </div>
                    </div>
                    <div id="rankingList"></div>
                </div>
            </div>
            
            <!-- 对阵内容 -->
            <div id="matchesContent" style="display: none;">
                <div class="round-nav">
                    <button onclick="prevRound()" id="prevRoundBtn">◀</button>
                    <span class="round-info" id="roundInfo">第1轮/共4轮</span>
                    <button onclick="nextRound()" id="nextRoundBtn">▶</button>
                </div>
                <div id="matchesList"></div>
            </div>
            
            <div class="query-time" id="detailQueryTime"></div>
        </div>
        
        <footer>
            <p>围棋智能助手 &copy; 2026</p>
        </footer>
    </div>
    
    <script>
        // 状态管理
        let currentState = {
            events: [],
            selectedEvent: null,
            selectedGroup: null,
            rankingMode: 'default',
            currentRound: 1,
            totalRounds: 1,
            filter: 'all'
        };
        
        // 查询比赛列表
        async function queryEvents() {
            const area = document.getElementById('areaSelect').value;
            const month = document.getElementById('monthSelect').value;
            const keyword = document.getElementById('keywordInput').value.trim();
            const queryBtn = document.getElementById('queryBtn');
            
            // 检查 Token
            if (!hasToken()) {
                redirectToAuth();
                return;
            }
            
            queryBtn.disabled = true;
            queryBtn.textContent = '查询中...';
            
            try {
                let url = `${API_BASE}/api/v1/yunbisai/events?month=${month}`;
                if (area) url += `&area=${encodeURIComponent(area)}`;
                if (keyword) url += `&keyword=${encodeURIComponent(keyword)}`;
                
                const response = await fetchWithAuth(url);
                if (!response) return;
                
                const data = await response.json();
                
                if (!data.success) {
                    throw new Error(data.error?.message || '查询失败');
                }
                
                currentState.events = data.data.events;
                displayEvents(data.data);
                
            } catch (error) {
                alert('查询失败: ' + error.message);
            } finally {
                queryBtn.disabled = false;
                queryBtn.textContent = '开始查询';
            }
        }
        
        // 显示比赛列表
        function displayEvents(data) {
            document.getElementById('querySection').style.display = 'none';
            document.getElementById('eventsSection').style.display = 'block';
            
            const container = document.getElementById('eventsList');
            
            if (!data.events || data.events.length === 0) {
                container.innerHTML = `
                    <div class="card">
                        <div class="not-found">
                            <div class="not-found-icon">🔍</div>
                            <p>未找到符合条件的比赛</p>
                        </div>
                    </div>
                `;
                return;
            }
            
            // 保存原始数据，按日期倒序
            currentState.events = data.events.sort((a, b) => {
                const dateA = a.date || '';
                const dateB = b.date || '';
                return dateB.localeCompare(dateA);
            });
            currentState.eventsData = data;
            
            // 计算各状态数量
            const today = new Date().toISOString().split('T')[0];
            currentState.endedCount = currentState.events.filter(e => e.date && e.date < today).length;
            currentState.ongoingCount = currentState.events.filter(e => e.date && e.date >= today).length;
            
            renderEventsList();
            
            // 保存查询条件到本地
            saveQueryHistory();
        }
        
        // 渲染比赛列表（带筛选）
        function renderEventsList() {
            const container = document.getElementById('eventsList');
            const data = currentState.eventsData;
            const today = new Date().toISOString().split('T')[0];
            const total = currentState.events.length;
            const ended = currentState.endedCount;
            const ongoing = currentState.ongoingCount;
            
            // 更新标签文本
            document.getElementById('filterAll').textContent = `全部 ${total}`;
            document.getElementById('filterOngoing').textContent = `未结束 ${ongoing}`;
            document.getElementById('filterEnded').textContent = `已结束 ${ended}`;
            
            // 筛选比赛
            let filteredEvents = currentState.events;
            if (currentState.filter === 'ongoing') {
                filteredEvents = filteredEvents.filter(e => e.date && e.date >= today);
            } else if (currentState.filter === 'ended') {
                filteredEvents = filteredEvents.filter(e => e.date && e.date < today);
            }
            
            let html = '';
            
            if (filteredEvents.length === 0) {
                html += `
                    <div class="card">
                        <div class="not-found">
                            <p>没有符合条件的比赛</p>
                        </div>
                    </div>
                `;
            } else {
                filteredEvents.forEach(event => {
                    const isEnded = event.date && event.date < today;
                    const statusTag = isEnded ? 
                        '<span class="event-status ended">已结束</span>' : 
                        '<span class="event-status ongoing">未结束</span>';
                    html += `
                        <div class="event-card" onclick="selectEvent(${event.id})">
                            <div class="event-title">${event.title} ${statusTag}</div>
                            <div class="event-meta">
                                <span>📍 ${event.city || '未知'}</span>
                                <span>📅 ${event.date || '日期待定'}</span>
                                <span>👤 ${event.players || 0}人</span>
                            </div>
                        </div>
                    `;
                });
            }
            
            // 查询耗时显示
            if (data._perf && data._perf.seconds !== undefined) {
                html += `<div class="query-time">⏱️ 查询耗时: ${data._perf.seconds}s</div>`;
            }
            
            container.innerHTML = html;
        }
        
        // 筛选比赛
        function filterEvents(type) {
            currentState.filter = type;
            
            // 更新标签状态
            document.querySelectorAll('.filter-tab').forEach(tab => tab.classList.remove('active'));
            if (type === 'all') document.getElementById('filterAll').classList.add('active');
            if (type === 'ongoing') document.getElementById('filterOngoing').classList.add('active');
            if (type === 'ended') document.getElementById('filterEnded').classList.add('active');
            
            renderEventsList();
        }
        
        // 选择比赛，查询分组
        async function selectEvent(eventId) {
            const event = currentState.events.find(e => e.id === eventId);
            currentState.selectedEvent = event;
            
            // 记录最近访问
            if (event) {
                recordVisitedEvent(eventId, event.title);
            }
            
            if (!hasToken()) {
                redirectToAuth();
                return;
            }
            
            document.getElementById('eventsSection').style.display = 'none';
            document.getElementById('groupsSection').style.display = 'block';
            document.getElementById('groupsList').innerHTML = `
                <div class="card loading">
                    <div class="spinner"></div>
                    <p>加载分组信息...</p>
                </div>
            `;
            
            try {
                const response = await fetchWithAuth(
                    `${API_BASE}/api/v1/yunbisai/events/${eventId}/groups`
                );
                if (!response) return;
                
                const data = await response.json();
                
                if (!data.success) {
                    throw new Error(data.error?.message || '加载分组失败');
                }
                
                displayGroups(data.data);
                
            } catch (error) {
                document.getElementById('groupsList').innerHTML = `
                    <div class="card">
                        <div class="error">加载失败: ${error.message}</div>
                    </div>
                `;
            }
        }
        
        // 显示分组列表
        function displayGroups(data) {
            const container = document.getElementById('groupsList');
            
            if (!data.groups || data.groups.length === 0) {
                container.innerHTML = `
                    <div class="card">
                        <div class="not-found">
                            <div class="not-found-icon">📭</div>
                            <p>该比赛暂无分组数据</p>
                        </div>
                    </div>
                `;
                return;
            }
            
            let html = `<div class="card"><h2>📂 ${currentState.selectedEvent.title}</h2><p style="color:#888;font-size:0.9em;">共 ${data.total} 个分组</p></div>`;
            
            data.groups.forEach(group => {
                // 尝试多个可能的字段名
                let playerCount = group.players;
                if (playerCount === undefined || playerCount === null) {
                    playerCount = group.playernum;
                }
                if (playerCount === undefined || playerCount === null) {
                    playerCount = group.participant_count;
                }
                playerCount = playerCount !== undefined && playerCount !== null ? playerCount : '未知';
                
                html += `
                    <div class="group-card" onclick="selectGroup(${group.id}, '${group.name}')">
                        <div class="group-name">${group.name}</div>
                        <div class="group-players">${playerCount} 名选手</div>
                    </div>
                `;
            });
            
            // 查询耗时显示
            if (data._perf && data._perf.seconds !== undefined) {
                html += `<div class="query-time">⏱️ 查询耗时: ${data._perf.seconds}s</div>`;
            }
            
            container.innerHTML = html;
        }
        
        // 选择分组，加载排名和对阵
        async function selectGroup(groupId, groupName) {
            currentState.selectedGroup = { id: groupId, name: groupName };
            
            if (!hasToken()) {
                redirectToAuth();
                return;
            }
            
            document.getElementById('groupsSection').style.display = 'none';
            document.getElementById('groupDetailSection').style.display = 'block';
            
            // 加载排名
            await loadRanking(groupId);
            // 加载对阵（第1轮）
            await loadMatches(groupId, 1);
        }
        
        // 加载排名
        async function loadRanking(groupId) {
            const mode = currentState.rankingMode;
            document.getElementById('rankingList').innerHTML = `
                <div class="loading" style="padding: 20px;">
                    <div class="spinner"></div>
                    <p>加载排名中...</p>
                </div>
            `;
            
            try {
                const response = await fetchWithAuth(
                    `${API_BASE}/api/v1/yunbisai/groups/${groupId}?mode=${mode}`
                );
                if (!response) return;
                
                const data = await response.json();
                
                if (!data.success) {
                    throw new Error(data.error?.message || '加载排名失败');
                }
                
                currentState.totalRounds = data.data.total_rounds || 1;
                displayRanking(data.data);
                
            } catch (error) {
                document.getElementById('rankingList').innerHTML = `
                    <div class="error">加载失败: ${error.message}</div>
                `;
            }
        }
        
        // 显示排名
        function displayRanking(data) {
            const container = document.getElementById('rankingList');
            
            if (!data.rankings || data.rankings.length === 0) {
                container.innerHTML = `<div class="not-found">暂无排名数据</div>`;
                return;
            }
            
            // 判断是否是最终排名（已完成所有轮次）
            const isFinal = data.completed_rounds >= data.total_rounds;
            
            let html = '<table class="ranking-table"><thead><tr>';
            html += '<th>排名</th><th>姓名</th><th>积分</th><th>对手分</th>';
            if (isFinal) {
                html += '<th>累进分</th><th>逆减</th>';
            }
            html += '<th>战绩</th></tr></thead><tbody>';
            
            data.rankings.forEach((player, index) => {
                const rankClass = index < 3 ? 'top3' : '';
                const reverseMinus = player.opponent_score_reverse_minus || '-';
                html += `<tr>
                    <td class="rank-num ${rankClass}">${player.rank}</td>
                    <td class="rank-name">${player.name}${player.team ? `<br><span class="rank-team">${player.team}</span>` : ''}</td>
                    <td class="rank-score">${player.score}</td>
                    <td>${player.opponent_score || 0}</td>
                    ${isFinal ? `<td>${player.progressive_score || 0}</td><td>${reverseMinus}</td>` : ''}
                    <td>${player.record}</td>
                </tr>`;
            });
            
            html += '</tbody></table>';
            container.innerHTML = html;
            
            // 显示查询时间
            let timeText = `已完成 ${data.completed_rounds || 0}/${data.total_rounds || 0} 轮`;
            const perfTime = data._perf?.ranking?.total || data._perf?.total;
            if (perfTime !== undefined) {
                timeText += ` | 查询耗时: ${perfTime}s`;
            }
            document.getElementById('detailQueryTime').textContent = timeText;
        }
        
        // 加载对阵
        async function loadMatches(groupId, round) {
            currentState.currentRound = round;
            
            if (document.getElementById('matchesContent').style.display === 'none') {
                // 如果对阵标签未激活，只更新轮次选择器
                updateRoundSelector();
                return;
            }
            
            document.getElementById('matchesList').innerHTML = `
                <div class="loading" style="padding: 20px;">
                    <div class="spinner"></div>
                    <p>加载第${round}轮对阵...</p>
                </div>
            `;
            
            try {
                const response = await fetchWithAuth(
                    `${API_BASE}/api/v1/yunbisai/groups/${groupId}/matches?round=${round}`
                );
                if (!response) return;
                
                const data = await response.json();
                
                if (!data.success) {
                    throw new Error(data.error?.message || '加载对阵失败');
                }
                
                displayMatches(data.data);
                updateRoundSelector();
                
            } catch (error) {
                document.getElementById('matchesList').innerHTML = `
                    <div class="error">加载失败: ${error.message}</div>
                `;
            }
        }
        
        // 显示对阵
        function displayMatches(data) {
            const container = document.getElementById('matchesList');
            currentState.totalRounds = data.total_rounds || currentState.totalRounds;
            currentState.currentRound = data.round || currentState.currentRound;
            
            updateRoundSelector();
            
            if (!data.matches || data.matches.length === 0) {
                container.innerHTML = `<div class="not-found">第${data.round}轮暂无对阵数据</div>`;
                return;
            }
            
            let html = '';
            
            data.matches.forEach(match => {
                const resultText = match.result ? `<span class="match-result">${match.result}</span>` : '';
                html += `
                    <div class="match-card">
                        <div class="match-round">台号 ${match.table}</div>
                        <div class="match-players">
                            <div class="match-player black">
                                <div>${match.black}</div>
                                ${match.black_score !== undefined ? `<small>${match.black_score}</small>` : ''}
                            </div>
                            <div class="match-vs">VS ${resultText}</div>
                            <div class="match-player white">
                                <div>${match.white}</div>
                                ${match.white_score !== undefined ? `<small>${match.white_score}</small>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            });
            
            const perfTime = data._perf?.total;
            if (perfTime !== undefined) {
                html += `<div class="query-time">⏱️ 查询耗时: ${perfTime}s</div>`;
            }
            
            container.innerHTML = html;
        }
        
        // 更新轮次导航
        function updateRoundSelector() {
            const roundInfo = document.getElementById('roundInfo');
            const prevBtn = document.getElementById('prevRoundBtn');
            const nextBtn = document.getElementById('nextRoundBtn');
            
            roundInfo.textContent = `第${currentState.currentRound}轮/共${currentState.totalRounds}轮`;
            prevBtn.disabled = currentState.currentRound <= 1;
            nextBtn.disabled = currentState.currentRound >= currentState.totalRounds;
        }
        
        // 上一轮
        function prevRound() {
            if (currentState.currentRound > 1) {
                loadMatches(currentState.selectedGroup.id, currentState.currentRound - 1);
            }
        }
        
        // 下一轮
        function nextRound() {
            if (currentState.currentRound < currentState.totalRounds) {
                loadMatches(currentState.selectedGroup.id, currentState.currentRound + 1);
            }
        }
        
        // 切换标签页
        function switchTab(tab) {
            document.getElementById('rankingTab').classList.toggle('active', tab === 'ranking');
            document.getElementById('matchesTab').classList.toggle('active', tab === 'matches');
            document.getElementById('rankingContent').style.display = tab === 'ranking' ? 'block' : 'none';
            document.getElementById('matchesContent').style.display = tab === 'matches' ? 'block' : 'none';
            
            if (tab === 'matches') {
                loadMatches(currentState.selectedGroup.id, currentState.currentRound);
            }
        }
        
        // 设置排名模式
        function setRankingMode(mode) {
            if (mode === currentState.rankingMode) return;
            currentState.rankingMode = mode;
            
            document.getElementById('modeDefault').classList.toggle('active', mode === 'default');
            document.getElementById('modeSimple').classList.toggle('active', mode === 'simple');
            
            loadRanking(currentState.selectedGroup.id);
        }
        
        // 返回操作
        function backToQuery() {
            document.getElementById('eventsSection').style.display = 'none';
            document.getElementById('querySection').style.display = 'block';
            currentState.events = [];
        }
        
        function backToEvents() {
            document.getElementById('groupsSection').style.display = 'none';
            document.getElementById('eventsSection').style.display = 'block';
            currentState.selectedEvent = null;
        }
        
        function backToGroups() {
            document.getElementById('groupDetailSection').style.display = 'none';
            document.getElementById('groupsSection').style.display = 'block';
            currentState.selectedGroup = null;
            // 重置标签页
            switchTab('ranking');
        }
        
        // 保存查询条件到本地
        function saveQueryHistory() {
            const query = {
                area: document.getElementById('areaSelect').value,
                month: document.getElementById('monthSelect').value,
                keyword: document.getElementById('keywordInput').value,
                time: new Date().toISOString()
            };
            localStorage.setItem('yunbisai_last_query', JSON.stringify(query));
        }
        
        // 加载最近查询条件
        function loadQueryHistory() {
            try {
                const saved = localStorage.getItem('yunbisai_last_query');
                if (saved) {
                    const query = JSON.parse(saved);
                    if (query.area !== undefined) document.getElementById('areaSelect').value = query.area;
                    if (query.month !== undefined) document.getElementById('monthSelect').value = query.month;
                    if (query.keyword !== undefined) document.getElementById('keywordInput').value = query.keyword;
                }
            } catch (e) {}
        }
        
        // 记录最近访问的比赛
        function recordVisitedEvent(eventId, eventTitle) {
            try {
                let visited = JSON.parse(localStorage.getItem('yunbisai_visited') || '[]');
                // 去重并移到最前
                visited = visited.filter(e => e.id !== eventId);
                visited.unshift({ id: eventId, title: eventTitle, time: new Date().toISOString() });
                // 只保留最近5个
                visited = visited.slice(0, 5);
                localStorage.setItem('yunbisai_visited', JSON.stringify(visited));
                renderVisitedEvents();
            } catch (e) {}
        }
        
        // 显示最近访问的比赛
        function renderVisitedEvents() {
            try {
                const visited = JSON.parse(localStorage.getItem('yunbisai_visited') || '[]');
                const container = document.getElementById('recentQueries');
                if (visited.length === 0) {
                    container.innerHTML = '';
                    return;
                }
                let html = '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;"><span style="color:white;font-size:0.85em;">最近访问:</span>';
                visited.forEach(e => {
                    html += `<span class="visited-tag" onclick="quickVisit(${e.id}, '${e.title.replace(/'/g, "\\'")}')">${e.title}</span>`;
                });
                html += '</div>';
                container.innerHTML = html;
            } catch (e) {}
        }
        
        // 快速访问最近比赛
        async function quickVisit(eventId, eventTitle) {
            // 模拟选择事件
            const mockEvent = { id: eventId, title: eventTitle };
            currentState.selectedEvent = mockEvent;
            await selectEvent(eventId);
        }
        
        // 页面加载时恢复查询条件
        loadQueryHistory();
        renderVisitedEvents();
        
        // 回车键查询
        document.getElementById('keywordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') queryEvents();
        });
    </script>
</body>
</html>
