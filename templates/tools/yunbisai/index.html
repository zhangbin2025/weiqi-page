<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>云比赛 - 围棋智能助手</title>
    <link rel="icon" type="image/x-icon" href="{{ base_path }}/assets/favicon/favicon.ico?v=20260502">
    <script src="{{ base_path }}/assets/js/yunbisai-proxy.js?v=20260508"></script>
    <script>document.write('<script src="{{ base_path }}/assets/js/auth.js?v=' + Date.now() + '"><\/script>');</script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; color: #333; }
        .container { max-width: 480px; margin: 0 auto; padding: 12px; min-height: 100vh; }
        
        /* 头部 */
        header { padding: 12px 10px; color: white; text-align: center; }
        h1 { font-size: 1.6em; margin-bottom: 4px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .subtitle { font-size: 0.85em; opacity: 0.9; }
        
        /* 标签切换 */
        .tabs { display: flex; background: rgba(255,255,255,0.15); border-radius: 12px; padding: 4px; margin-bottom: 16px; }
        .tab { flex: 1; padding: 12px; text-align: center; color: rgba(255,255,255,0.8); cursor: pointer; border-radius: 10px; transition: all 0.3s ease; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .tab:hover { color: white; }
        .tab.active { background: white; color: #667eea; font-weight: 500; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* 卡片 */
        .card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card h2 { font-size: 1.1em; margin-bottom: 12px; color: #333; display: flex; align-items: center; gap: 8px; }
        
        .icon-btn { background: #f0f0f0; border: none; color: #666; cursor: pointer; border-radius: 8px; transition: background 0.2s; }
        .icon-btn:hover { background: #e0e0e0; }
        
        input, select { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; margin-bottom: 12px; }
        input:focus, select:focus { outline: none; border-color: #667eea; }
        
        button { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        
        /* 空状态 */
        .empty-state { text-align: center; padding: 40px 20px; color: #888; }
        .empty-state-icon { font-size: 3em; margin-bottom: 12px; opacity: 0.5; }
        
        /* 历史列表 */
        .history-list { display: flex; flex-direction: column; gap: 12px; }
        .history-item { background: white; border-radius: 12px; padding: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.2s; position: relative; }
        .history-item:hover { transform: translateY(-2px); }
        .history-title { font-weight: 600; color: #333; font-size: 1em; line-height: 1.4; padding-right: 70px; }
        .history-time { position: absolute; top: 16px; right: 16px; font-size: 0.75em; color: #888; white-space: nowrap; }
        
        footer { text-align: center; padding: 20px; color: rgba(255,255,255,0.7); font-size: 0.8em; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header>
            <h1>🏆 云比赛</h1>
            <p class="subtitle">查询全国围棋比赛信息</p>
        </header>
        
        <!-- 标签切换 -->
        <div class="tabs">
            <div class="tab active" data-tab="query" onclick="switchTab('query')">
                <span>🔍</span>
                <span>查询</span>
            </div>
            <div class="tab" data-tab="recent" onclick="switchTab('recent')">
                <span>📋</span>
                <span>最近</span>
            </div>
        </div>
        
        <!-- 查询面板 -->
        <div id="queryPanel" class="tab-content active">
            <div class="card">
                <h2>🔍 查询比赛</h2>
                <select id="areaSelect">
                    <option value="">全国</option>
                    <option value="广东省" selected>广东省</option>
                    <option value="北京市">北京市</option>
                    <option value="上海市">上海市</option>
                    <option value="浙江省">浙江省</option>
                    <option value="江苏省">江苏省</option>
                </select>
                <select id="monthSelect">
                    <option value="3">最近3个月</option>
                    <option value="1" selected>最近1个月</option>
                    <option value="6">最近半年</option>
                    <option value="12">最近1年</option>
                </select>
                <input type="text" id="keywordInput" placeholder="关键词（可选）">
                <button onclick="queryEvents()" id="queryBtn">开始查询</button>
            </div>
        </div>
        
        <!-- 最近面板 -->
        <div id="recentPanel" class="tab-content">
            <div class="card">
                <h2>📋 最近访问 <button class="icon-btn" onclick="clearHistory()" title="清除所有记录" style="width:auto;padding:4px 8px;font-size:0.85em;margin-left:auto;">🗑️ 清除</button></h2>
                <div id="historyList" class="history-list">
                    <!-- 历史列表将在这里渲染 -->
                </div>
            </div>
        </div>
        
        <footer><p>围棋智能助手 &copy; 2026</p></footer>
    </div>
    
    <script>
        const CACHE_KEY = 'yunbisai_visited';
        const MAX_RECENT = 20;
        
        // ========== 数据源配置 ==========
        // 默认使用代理方式（免费），不需要后端服务器
        // 可切换为 'backend' 使用后端 API（需要认证）
        let dataSource = 'proxy'; // 'proxy' 或 'backend'
        let proxyClient = null;
        
        // 初始化代理客户端
        function initProxyClient() {
            if (!proxyClient) {
                proxyClient = new YunbisaiProxy({
                    proxyUrl: 'https://api.weiqi.lol',
                    debug: false,
                    timeout: 30000
                });
            }
            return proxyClient;
        }
        
        // ========== 标签切换 ==========
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelector(`.tab[data-tab="${tabName}"]`).classList.add('active');
            
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            document.getElementById(tabName + 'Panel').classList.add('active');
            
            if (tabName === 'recent') {
                renderHistoryList();
            }
        }
        
        // ========== 本地存储操作 ==========
        function getVisitedList() {
            try {
                const visited = localStorage.getItem(CACHE_KEY);
                return visited ? JSON.parse(visited) : [];
            } catch (e) {
                return [];
            }
        }
        
        function saveVisitedList(list) {
            localStorage.setItem(CACHE_KEY, JSON.stringify(list.slice(0, MAX_RECENT)));
        }
        
        function formatRelativeTime(isoTime) {
            const date = new Date(isoTime);
            const now = new Date();
            const diffMs = now - date;
            const diffSec = Math.floor(diffMs / 1000);
            const diffMin = Math.floor(diffSec / 60);
            const diffHour = Math.floor(diffMin / 60);
            const diffDay = Math.floor(diffHour / 24);
            
            if (diffSec < 60) return '刚刚';
            if (diffMin < 60) return `${diffMin}分钟前`;
            if (diffHour < 24) return `${diffHour}小时前`;
            if (diffDay < 7) return `${diffDay}天前`;
            return date.toLocaleDateString('zh-CN');
        }
        
        // ========== 渲染历史列表 ==========
        function renderHistoryList() {
            const listContainer = document.getElementById('historyList');
            const visited = getVisitedList();
            
            if (visited.length === 0) {
                listContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        <p>暂无访问记录</p>
                        <p style="font-size: 0.85em; margin-top: 8px;">在"查询"标签页开始查询</p>
                    </div>
                `;
                return;
            }
            
            listContainer.innerHTML = visited.map(item => `
                <div class="history-item" onclick="quickVisit(${item.id}, '${item.title.replace(/'/g, "\\'")}')">
                    <span class="history-time">${formatRelativeTime(item.time)}</span>
                    <div class="history-title">🏆 ${item.title}</div>
                </div>
            `).join('');
        }
        
        // ========== 清除历史 ==========
        function clearHistory() {
            if (!confirm('确定要清除所有访问记录吗？')) return;
            localStorage.removeItem(CACHE_KEY);
            renderHistoryList();
        }
        
        // ========== 查询比赛 ==========
        async function queryEvents() {
            const area = document.getElementById('areaSelect').value;
            const month = document.getElementById('monthSelect').value;
            const keyword = document.getElementById('keywordInput').value.trim();
            
            document.getElementById('queryBtn').disabled = true;
            document.getElementById('queryBtn').textContent = '查询中...';
            
            try {
                let data;
                
                if (dataSource === 'proxy') {
                    // 使用代理方式（免费，不需要后端）
                    const client = initProxyClient();
                    const result = await client.getEvents({
                        area: area,
                        month: parseInt(month),
                        keyword: keyword
                    });
                    
                    data = {
                        success: true,
                        data: result
                    };
                } else {
                    // 使用后端 API 方式（需要认证）
                    if (!hasToken()) { redirectToAuth(); return; }
                    
                    let url = `/api/v1/yunbisai/events?month=${month}`;
                    if (area) url += `&area=${encodeURIComponent(area)}`;
                    if (keyword) url += `&keyword=${encodeURIComponent(keyword)}`;
                    
                    const response = await fetchWithAuth(url);
                    if (!response) return;
                    data = await response.json();
                }
                
                if (!data.success) throw new Error(data.error?.message || '查询失败');
                
                // 保存查询条件并跳转到比赛列表页
                const query = { area, month, keyword, data: data.data };
                sessionStorage.setItem('yunbisai_query', JSON.stringify(query));
                
                location.href = 'events.html';
                
            } catch (error) {
                alert('查询失败: ' + error.message);
            } finally {
                document.getElementById('queryBtn').disabled = false;
                document.getElementById('queryBtn').textContent = '开始查询';
            }
        }
        
        // ========== 快速访问 ==========
        function quickVisit(eventId, eventTitle) {
            sessionStorage.setItem('yunbisai_event', JSON.stringify({ id: eventId, title: eventTitle }));
            location.href = 'detail.html';
        }
        
        // ========== 记录访问 ==========
        function recordVisited(event) {
            if (!event) return;
            let visited = getVisitedList();
            visited = visited.filter(e => e.id !== event.id);
            visited.unshift({ id: event.id, title: event.title, time: new Date().toISOString() });
            saveVisitedList(visited);
        }
        
        document.getElementById('keywordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') queryEvents();
        });
    </script>
</body>
</html>
