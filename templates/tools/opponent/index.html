<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>对手分析 - 围棋智能助手</title>
    <link rel="icon" type="image/x-icon" href="{{ base_path }}/assets/favicon/favicon.ico?v=20260502">
    <script>const BASE_PATH = '{{ base_path }}';</script>
    <script>document.write('<script src="{{ base_path }}/assets/js/auth.js?v=' + Date.now() + '"><\/script>');</script>
    <!-- pako for gzip decompression -->
    <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
    <!-- Proxy 模式依赖 -->
    <script src="{{ base_path }}/assets/js/foxwq-proxy.js"></script>
    <script src="{{ base_path }}/assets/js/sgf-parser.js"></script>
    <script src="{{ base_path }}/assets/js/coordinate-converter.js"></script>
    <script src="{{ base_path }}/assets/js/corner-extractor.js"></script>
    <script src="{{ base_path }}/assets/js/joseki-matcher.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 12px;
            min-height: 100vh;
        }

        header {
            padding: 12px 10px;
            color: white;
            text-align: center;
        }

        h1 {
            font-size: 1.6em;
            margin-bottom: 4px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            font-size: 0.85em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 {
            display: flex;
            align-items: center;
        }

        .icon-btn {
            background: #f0f0f0;
            border: none;
            color: #666;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .icon-btn:hover {
            background: #e0e0e0;
        }

        .card h2 {
            font-size: 1.1em;
            margin-bottom: 12px;
            color: #333;
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 12px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 13px;
            margin-top: 0;
            width: auto;
            min-width: 60px;
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #888;
        }

        .empty-state-icon {
            font-size: 3em;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        /* 标签切换 */
        .tabs {
            display: flex;
            background: rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 16px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            color: rgba(255,255,255,0.8);
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s ease;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .tab:hover {
            color: white;
        }

        .tab.active {
            background: white;
            color: #667eea;
            font-weight: 500;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* 统计卡片 */
        .stats-cards {
            display: none;
        }

        .stats-cards.show {
            display: block;
        }

        .stats-card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .stats-card:hover {
            transform: translateY(-2px);
        }

        .stats-card:active {
            transform: scale(0.98);
        }

        .stats-card h3 {
            font-size: 1em;
            color: #666;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.4em;
            font-weight: 600;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.8em;
            color: #888;
            margin-top: 4px;
        }

        .stat-item-full {
            grid-column: span 2;
            text-align: center;
            padding-top: 12px;
            border-top: 1px solid #eee;
        }

        .stat-item-full .stat-value {
            font-size: 1.8em;
        }

        /* 历史记录列表 */
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .history-item {
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .history-item:hover {
            transform: translateY(-2px);
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .history-id {
            font-size: 1.1em;
            font-weight: 600;
            color: #333;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .history-time {
            font-size: 0.8em;
            color: #888;
        }

        .history-time.stale {
            color: #ff9800;
        }

        .history-stats {
            display: flex;
            gap: 16px;
            padding-top: 12px;
            border-top: 1px solid #eee;
        }

        .history-stat {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.9em;
            color: #666;
        }



        footer {
            text-align: center;
            padding: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 0.7em;
        }
        
        /* 进度条样式 */
        .progress-container {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .progress-title {
            font-size: 1em;
            font-weight: 600;
            margin-bottom: 12px;
            color: #333;
        }
        .progress-bar-bg {
            height: 24px;
            background: #f5f5f5;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 12px;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.85em;
            font-weight: 600;
        }
        .progress-text {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .progress-detail {
            font-size: 0.75em;
            color: #999;
        }
        .progress-spinner {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            flex-shrink: 0;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 对手分析</h1>
            <p class="subtitle">分析野狐棋手棋谱与定式</p>
        </header>

        <!-- 标签切换 -->
        <div class="tabs">
            <div class="tab active" data-tab="query" onclick="switchTab('query')">
                <span>🔍</span>
                <span>查询</span>
            </div>
            <div class="tab" data-tab="recent" onclick="switchTab('recent')">
                <span>📋</span>
                <span>最近</span>
            </div>
        </div>

        <!-- 查询面板 -->
        <div id="queryPanel" class="tab-content active">
            <div class="card">
                <h2>🔍 野狐棋手ID</h2>
                <input type="text" id="foxwqIdInput" placeholder="请输入野狐昵称..." maxlength="20">
                <select id="limitSelect">
                    <option value="10" selected>最近 10 盘</option>
                    <option value="30">最近 30 盘</option>
                    <option value="50">最近 50 盘</option>
                    <option value="100">最近 100 盘</option>
                </select>
                <button onclick="analyzeOpponent()" id="queryBtn">开始分析</button>
            </div>
        </div>

        <!-- 最近面板 -->
        <div id="recentPanel" class="tab-content">
            <div class="card">
                <h2>📋 最近查询 <button class="icon-btn" onclick="clearHistory()" title="清除所有记录" style="width:auto;padding:4px 8px;font-size:0.85em;margin-left:auto;">🗑️ 清除</button></h2>
                <div id="historyList" class="history-list">
                    <!-- 历史列表将在这里渲染 -->
                </div>
            </div>
        </div>



        <!-- 结果显示 -->
        <div id="statsSection" class="stats-cards">
            <!-- 进度条（proxy 模式） -->
            <div id="progressContainer" class="progress-container" style="display: none;">
                <div class="progress-title">📊 分析进度</div>
                <div class="progress-bar-bg">
                    <div id="progressBar" class="progress-bar-fill" style="width: 0%;">0%</div>
                </div>
                <div id="progressText" class="progress-text">
                    <span class="progress-spinner"></span>
                    <span id="progressMessage">准备中...</span>
                </div>
                <div id="progressDetail" class="progress-detail"></div>
            </div>
            <!-- 统计卡片将通过JS渲染 -->
        </div>

        <footer>
            <p>围棋智能助手 &copy; 2026</p>
        </footer>
    </div>

    <script>
        // ========== 常量定义 ==========
        const CACHE_KEY = 'opponent_cache';
        const RECENT_KEY = 'opponent_recent';
        const MAX_RECENT = 20;
        const CACHE_EXPIRE_DAYS = 7;
        
        // 数据源: 'proxy' (前端代理) 或 'backend' (后端 API)
        const DATA_SOURCE = 'proxy'; // 默认使用代理模式

        let currentData = null;
        
        // ========== 进度更新函数 ==========
        function updateProgress(percent, message, detail) {
            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');
            const progressMessage = document.getElementById('progressMessage');
            const progressDetail = document.getElementById('progressDetail');
            
            if (progressContainer) {
                progressContainer.style.display = 'block';
            }
            if (progressBar) {
                progressBar.style.width = percent + '%';
                progressBar.textContent = Math.round(percent) + '%';
            }
            if (progressMessage) {
                progressMessage.textContent = message || '处理中...';
            }
            if (progressDetail) {
                progressDetail.textContent = detail || '';
            }
        }

        // ========== 页面加载 ==========
        window.addEventListener('pageshow', function(event) {
            // Proxy 模式不需要认证，只在 backend 模式下检查认证
            // 如果用户点击"开始分析"时选择了 backend 模式，会在 analyzeOpponentViaBackend 中检查认证
            
            // 加载时渲染历史列表
            renderHistoryList();

            // 恢复 sessionStorage 中的当前数据
            const stored = sessionStorage.getItem('opponent_data');
            if (stored) {
                try {
                    const data = JSON.parse(stored);
                    if (data.foxwqId) {
                        document.getElementById('foxwqIdInput').value = data.foxwqId;
                    }
                    if (data.limit) {
                        document.getElementById('limitSelect').value = data.limit;
                    }
                    if (data.games && data.games.length > 0) {
                        currentData = data;
                        displayStats(data);
                    }
                } catch (e) {
                    console.error('恢复数据失败:', e);
                }
            }
        });

        // ========== 标签切换 ==========
        function switchTab(tabName) {
            // 切换标签样式
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelector(`.tab[data-tab="${tabName}"]`).classList.add('active');

            // 切换内容面板
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            document.getElementById(tabName + 'Panel').classList.add('active');

            // 如果切换到最近标签，刷新列表
            if (tabName === 'recent') {
                renderHistoryList();
            }
        }

        // ========== 本地存储操作 ==========

        // 获取缓存数据
        function getCache() {
            try {
                const cache = localStorage.getItem(CACHE_KEY);
                return cache ? JSON.parse(cache) : {};
            } catch (e) {
                return {};
            }
        }

        // 保存缓存数据
        function saveCache(cache) {
            localStorage.setItem(CACHE_KEY, JSON.stringify(cache));
        }

        // 获取最近列表
        function getRecentList() {
            try {
                const recent = localStorage.getItem(RECENT_KEY);
                return recent ? JSON.parse(recent) : [];
            } catch (e) {
                return [];
            }
        }

        // 保存最近列表
        function saveRecentList(list) {
            localStorage.setItem(RECENT_KEY, JSON.stringify(list.slice(0, MAX_RECENT)));
        }

        // 添加/更新缓存
        function addToCache(foxwqId, data) {
            const cache = getCache();
            cache[foxwqId] = {
                foxwqId: foxwqId,
                cachedAt: new Date().toISOString(),
                data: data
            };
            saveCache(cache);

            // 更新最近列表（提到最前）
            let recent = getRecentList();
            recent = recent.filter(id => id !== foxwqId);
            recent.unshift(foxwqId);
            saveRecentList(recent);
        }

        // 检查缓存是否过期
        function isCacheStale(cachedAt) {
            const cached = new Date(cachedAt);
            const now = new Date();
            const diffDays = (now - cached) / (1000 * 60 * 60 * 24);
            return diffDays > CACHE_EXPIRE_DAYS;
        }

        // 格式化相对时间
        function formatRelativeTime(isoTime) {
            const date = new Date(isoTime);
            const now = new Date();
            const diffMs = now - date;
            const diffSec = Math.floor(diffMs / 1000);
            const diffMin = Math.floor(diffSec / 60);
            const diffHour = Math.floor(diffMin / 60);
            const diffDay = Math.floor(diffHour / 24);

            if (diffSec < 60) return '刚刚';
            if (diffMin < 60) return `${diffMin}分钟前`;
            if (diffHour < 24) return `${diffHour}小时前`;
            if (diffDay < 7) return `${diffDay}天前`;
            return date.toLocaleDateString('zh-CN');
        }

        // ========== 渲染历史列表 ==========
        function renderHistoryList() {
            const listContainer = document.getElementById('historyList');
            const recent = getRecentList();
            const cache = getCache();

            if (recent.length === 0) {
                listContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        <p>暂无查询记录</p>
                        <p style="font-size: 0.85em; margin-top: 8px;">在"查询"标签页开始分析</p>
                    </div>
                `;
                return;
            }

            listContainer.innerHTML = recent.map(id => {
                const item = cache[id];
                if (!item || !item.data) return '';

                const games = item.data.games || [];
                const gamesCount = games.length;
                const opponents = new Set(games.filter(g => g.opponent && g.opponent !== '未知').map(g => g.opponent));
                const josekiCount = item.data.joseki?.results?.length || 0;
                const stale = isCacheStale(item.cachedAt);

                return `
                    <div class="history-item" onclick="viewHistory('${id}')">
                        <div class="history-header">
                            <span class="history-id">👤 ${id}</span>
                            <span class="history-time ${stale ? 'stale' : ''}">
                                ${stale ? '⚠️ ' : ''}${formatRelativeTime(item.cachedAt)}
                            </span>
                        </div>
                        <div class="history-stats">
                            <span class="history-stat">📋 ${gamesCount}局</span>
                            <span class="history-stat">👥 ${opponents.size}对手</span>
                            <span class="history-stat">🎯 ${josekiCount}定式</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ========== 历史记录操作 ==========

        // 查看历史记录
        function viewHistory(foxwqId) {
            const cache = getCache();
            const item = cache[foxwqId];

            if (!item || !item.data) {
                alert('缓存数据不存在');
                return;
            }

            // 设置当前数据
            currentData = {
                foxwqId: foxwqId,
                ...item.data
            };

            // 保存到 sessionStorage 以便子页面使用
            sessionStorage.setItem('opponent_data', JSON.stringify(currentData));

            // 切换到查询标签并显示统计
            switchTab('query');
            document.getElementById('foxwqIdInput').value = foxwqId;

            // 渲染统计
            displayStats(currentData);
        }

        // 清除所有历史记录
        function clearHistory() {
            if (!confirm('确定要清除所有查询记录吗？')) return;
            localStorage.removeItem(CACHE_KEY);
            localStorage.removeItem(RECENT_KEY);
            renderHistoryList();
        }


        // ========== 分析对手 ==========
        async function analyzeOpponent(fromRefresh = false) {
            const foxwqId = document.getElementById('foxwqIdInput').value.trim();
            const limit = parseInt(document.getElementById('limitSelect').value);
            const queryBtn = document.getElementById('queryBtn');
            const statsSection = document.getElementById('statsSection');

            if (!foxwqId) {
                alert('请输入野狐昵称');
                return;
            }

            queryBtn.disabled = true;
            queryBtn.textContent = '分析中...';
            statsSection.style.display = 'block';
            statsSection.classList.add('show');

            // 根据数据源选择不同的实现
            if (DATA_SOURCE === 'proxy') {
                // 前端代理模式
                await analyzeOpponentViaProxy(foxwqId, limit, queryBtn, statsSection);
            } else {
                // 后端 API 模式
                await analyzeOpponentViaBackend(foxwqId, limit, queryBtn, statsSection);
            }
        }
        
        // 后端 API 模式
        async function analyzeOpponentViaBackend(foxwqId, limit, queryBtn, statsSection) {
            if (!hasToken()) {
                redirectToAuth();
                return;
            }

            statsSection.innerHTML = `
                <div class="card loading">
                    <div class="spinner"></div>
                    <p>正在分析 "${foxwqId}" 的棋谱...</p>
                    <p style="font-size: 0.85em; color: #888; margin-top: 8px;">
                        请耐心等待，分析需要一定时间...
                    </p>
                </div>
            `;

            try {
                const response = await fetchWithAuth(
                    '/api/opponent',
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ foxwq_id: foxwqId, limit: limit })
                    }
                );

                if (!response) return;

                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.error || '分析失败');
                }

                // 只有有有效棋谱数据才保存到缓存
                if (data.games && data.games.length > 0) {
                    addToCache(foxwqId, data);
                }

                // 设置当前数据
                currentData = {
                    foxwqId: foxwqId,
                    ...data
                };

                // 存储到 sessionStorage
                sessionStorage.setItem('opponent_data', JSON.stringify({
                    foxwqId: foxwqId,
                    limit: limit,
                    ...data
                }));

                // 显示统计
                displayStats(currentData);

            } catch (error) {
                statsSection.innerHTML = `
                    <div class="card">
                        <div class="error">
                            <strong>分析失败</strong>
                            <p>${error.message}</p>
                        </div>
                    </div>
                `;
            } finally {
                queryBtn.disabled = false;
                queryBtn.textContent = '开始分析';
            }
        }
        
        // 前端代理模式
        async function analyzeOpponentViaProxy(foxwqId, limit, queryBtn, statsSection) {
            try {
                // 步骤1: 初始化代理和匹配器
                updateProgress(5, '初始化...', '');
                
                const foxwqProxy = new FoxwqProxy({
                    proxyUrl: 'https://api.weiqi.lol'
                });
                
                const josekiMatcher = new JosekiMatcher(BASE_PATH + '/assets/data/joseki');
                await josekiMatcher.loadIndex();
                
                // 步骤2: 查询用户信息
                updateProgress(10, '查询用户信息...', `对手: ${foxwqId}`);
                
                const userInfo = await foxwqProxy.queryUserByName(foxwqId);
                const uid = userInfo.uid;
                
                updateProgress(15, '获取棋谱列表...', `UID: ${uid}`);
                
                // 步骤3: 获取棋谱列表
                const chessList = await foxwqProxy.fetchChessList(uid);
                
                if (!chessList || chessList.length === 0) {
                    statsSection.innerHTML = `
                        <div class="card">
                            <p style="text-align:center;padding:20px;">未找到棋谱</p>
                        </div>
                    `;
                    return;
                }
                
                // 调试：打印第一个棋谱的数据结构
                console.log('[Proxy] 棋谱列表示例:', chessList[0]);
                console.log('[Proxy] 棋谱对象字段:', Object.keys(chessList[0] || {}));
                
                // 限制棋谱数量
                const gamesToAnalyze = chessList.slice(0, limit);
                updateProgress(20, `找到 ${chessList.length} 个棋谱`, `将分析最近 ${gamesToAnalyze.length} 盘`);
                
                // 步骤3: 下载并分析每个棋谱
                const allResults = [];
                const sgfDataMap = {};  // 存储 SGF 数据，用于后续查看
                const totalGames = gamesToAnalyze.length;
                
                for (let i = 0; i < totalGames; i++) {
                    const game = gamesToAnalyze[i];
                    const progress = 20 + (i / totalGames) * 70; // 20%-90%
                    
                    updateProgress(
                        progress,
                        `分析棋谱 ${i + 1}/${totalGames}`,
                        `${game.blacknick || game.black || '?'} vs ${game.whitenick || game.white || '?'} - ${game.gameendtime || game.date || '-'}`
                    );
                    
                    try {
                        // 下载 SGF
                        const sgfData = await foxwqProxy.fetchSGF(game.chessid);
                        
                        if (!sgfData) {
                            console.warn(`[Proxy] 棋谱 ${game.chessid} 下载失败`);
                            continue;
                        }
                        
                        // 保存 SGF 数据
                        sgfDataMap[game.chessid] = sgfData;
                        
                        // 解析 SGF
                        const parser = new SGFParser();
                        const parsed = parser.parse(sgfData);
                        
                        // 提取主分支着法
                        const moves = parser.extractMainBranch(parsed.tree, 80);
                        
                        // 调试：打印解析结果
                        console.log(`[Proxy] 棋谱 ${game.chessid} 解析结果:`, {
                            hasParsed: !!parsed,
                            hasMoves: !!(moves && moves.length > 0),
                            movesLength: moves ? moves.length : 0,
                            sgfLength: sgfData ? sgfData.length : 0,
                            sgfPreview: sgfData ? sgfData.substring(0, 100) : 'empty'
                        });
                        
                        if (!moves || moves.length === 0) {
                            console.warn(`[Proxy] 棋谱 ${game.chessid} 解析失败`);
                            continue;
                        }
                        
                        // 提取四个角
                        const extractor = new CornerExtractor();
                        const corners = extractor.extractFourCorners(moves);
                        
                        // 匹配每个角
                        for (const cornerKey of ['tl', 'tr', 'bl', 'br']) {
                            const cornerMoves = corners[cornerKey];
                            
                            if (!cornerMoves || cornerMoves.length < 2) {
                                continue;
                            }
                            
                            // 从元组数组中提取坐标字符串
                            const coords = cornerMoves.map(([color, coord]) => coord);
                            
                            // 转换到右上角
                            const trMoves = CoordinateConverter.convertToTopRight(coords, cornerKey);
                            
                            // 标准化
                            const normResult = CoordinateConverter.normalizeCornerSequence(trMoves);
                            const normalized = normResult.normalized;
                            
                            // 匹配定式
                            const result = await josekiMatcher.matchSequence(normalized);
                            
                            if (result && result.matchedCount >= 3) {
                                allResults.push({
                                    joseki_id: result.josekiId || `local_${Date.now()}`,
                                    prefix: result.matched.join(' '),
                                    prefix_len: result.matchedCount,
                                    total_moves: result.totalCount,
                                    source_corner: cornerKey,
                                    frequency: result.freq || 0,
                                    probability: result.prob || 0,
                                    winrate_stats: result.winrate || null,
                                    extracted_moves: sgfData,
                                    game_info: {
                                        black: game.blacknick || game.black || '?',
                                        white: game.whitenick || game.white || '?',
                                        date: game.gameendtime || game.date || '-'
                                    },
                                    file: game.chessid || game.id
                                });
                            }
                        }
                        
                    } catch (error) {
                        console.error(`[Proxy] 棋谱 ${game.chessid} 分析失败:`, error);
                    }
                }
                
                // 步骤4: 整理结果
                updateProgress(95, '整理结果...', `发现 ${allResults.length} 个定式`);
                
                // 转换 games 数据格式，确保与 backend 模式一致
                const formattedGames = gamesToAnalyze.map(game => {
                    // 格式化段位
                    const formatDan = (danValue) => {
                        if (danValue >= 100) return `职业${danValue - 100}段`;
                        if (danValue >= 24) return `业${danValue - 20}段`;
                        if (danValue >= 20) return `业${danValue - 20}段`;
                        if (danValue >= 10) return `${danValue - 10}级`;
                        return `${danValue}级`;
                    };
                    
                    // 解析对局结果
                    const parseResult = (winner, point, reason) => {
                        if (winner === 0) return "和棋";
                        const winnerStr = winner === 1 ? "黑胜" : "白胜";
                        if (reason === 1) return point > 0 ? `${winnerStr} ${point}子` : winnerStr;
                        if (reason === 2) return `${winnerStr} (超时)`;
                        if (reason === 3) return `${winnerStr} (中盘)`;
                        if (reason === 4) return `${winnerStr} (认输)`;
                        return winnerStr;
                    };
                    
                    return {
                        black: game.blacknick || game.black || '?',
                        white: game.whitenick || game.white || '?',
                        blackdan: formatDan(game.blackdan || 0),
                        whitedan: formatDan(game.whitedan || 0),
                        date: (game.starttime || game.gameendtime || game.date || '-').split(' ')[0],  // 只显示日期
                        opponent: game.blacknick === foxwqId ? (game.whitenick || game.white || '?') : (game.blacknick || game.black || '?'),
                        result: parseResult(game.winner || 0, game.point || 0, game.reason || 0),
                        movenum: game.movenum || 0,
                        file: game.chessid || game.id,
                        sgf: sgfDataMap[game.chessid] || null  // 使用保存的 SGF 数据
                    };
                });
                
                currentData = {
                    foxwqId: foxwqId,
                    games: formattedGames,
                    joseki: { results: allResults }
                };
                
                // 保存到缓存
                if (gamesToAnalyze.length > 0) {
                    addToCache(foxwqId, currentData);
                }
                
                // 存储到 sessionStorage
                sessionStorage.setItem('opponent_data', JSON.stringify({
                    foxwqId: foxwqId,
                    limit: limit,
                    ...currentData
                }));
                
                // 显示统计
                displayStats(currentData);
                
                updateProgress(100, '完成！', '');
                
                // 隐藏进度条
                setTimeout(() => {
                    const progressContainer = document.getElementById('progressContainer');
                    if (progressContainer) {
                        progressContainer.style.display = 'none';
                    }
                }, 1000);
                
            } catch (error) {
                console.error('[Proxy] 分析失败:', error);
                statsSection.innerHTML = `
                    <div class="card">
                        <div class="error">
                            <strong>分析失败</strong>
                            <p>${error.message}</p>
                        </div>
                    </div>
                `;
            } finally {
                queryBtn.disabled = false;
                queryBtn.textContent = '开始分析';
            }
        }

        // ========== 显示统计 ==========
        function displayStats(data) {
            const statsSection = document.getElementById('statsSection');
            const games = data.games || [];
            const gamesCount = games.length;

            // 计算棋谱统计
            let firstDate = null;
            let lastDate = null;
            const opponents = new Set();
            const opponentCounts = {};

            games.forEach(game => {
                if (game.date) {
                    if (game.date && (!firstDate || firstDate > game.date)) firstDate = game.date;
                    if (game.date && (!lastDate || lastDate < game.date)) lastDate = game.date;
                }
                if (game.opponent && game.opponent !== '未知') {
                    opponents.add(game.opponent);
                    opponentCounts[game.opponent] = (opponentCounts[game.opponent] || 0) + 1;
                }
            });

            // 活跃对手（最常对手）
            let topOpponent = '-';
            let maxCount = 0;
            for (const [opponent, count] of Object.entries(opponentCounts)) {
                if (count > maxCount) {
                    maxCount = count;
                    topOpponent = opponent;
                }
            }

            // 定式统计
            let josekiCount = 0;
            let hotCount = 0;
            let hitCount = 0;
            let complexCount = 0;

            if (data.joseki && data.joseki.results) {
                const results = data.joseki.results;
                josekiCount = results.length || 0;

                results.forEach(r => {
                    const prefixLen = r.prefix_len || 0;
                    const frequency = r.frequency || 0;
                    const totalMoves = r.total_moves || 0;

                    // 热门: prefixLen >= 8 && frequency >= 5
                    if (prefixLen >= 8 && frequency >= 5) hotCount++;
                    // 命中: prefixLen >= 8 && prefixLen >= totalMoves
                    if (prefixLen >= 8 && prefixLen >= totalMoves) hitCount++;
                    // 复杂: prefixLen >= 12
                    if (prefixLen >= 12) complexCount++;
                });
            }

            statsSection.innerHTML = `
                <div class="stats-card" onclick="viewGames()">
                    <h3>📋 棋谱统计</h3>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-value">${gamesCount}</div>
                            <div class="stat-label">总对局数</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${opponents.size}</div>
                            <div class="stat-label">对弈对手</div>
                        </div>
                        <div class="stat-item stat-item-full">
                            <div class="stat-value" style="font-size:1.2em">${topOpponent}</div>
                            <div class="stat-label">活跃对手</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" style="font-size:1em">${firstDate || '-'}</div>
                            <div class="stat-label">最早对局</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" style="font-size:1em">${lastDate || '-'}</div>
                            <div class="stat-label">最新对局</div>
                        </div>
                    </div>
                </div>

                <div class="stats-card" onclick="viewJoseki()">
                    <h3>📚 定式发现</h3>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-value">${josekiCount}</div>
                            <div class="stat-label">匹配定式数</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${hotCount}</div>
                            <div class="stat-label">🔥 热门</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${hitCount}</div>
                            <div class="stat-label">🎯 命中</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${complexCount}</div>
                            <div class="stat-label">🧩 复杂</div>
                        </div>
                    </div>
                </div>
            `;

            statsSection.classList.add('show');
        }

        // ========== 导航 ==========
        function viewGames() {
            location.href = 'games.html';
        }

        function viewJoseki() {
            location.href = 'joseki.html';
        }

        // ========== 事件监听 ==========
        document.getElementById('foxwqIdInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                analyzeOpponent();
            }
        });
    </script>
</body>
