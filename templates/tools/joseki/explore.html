<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>定式探索 - 围棋定式工具</title>
    <link rel="icon" type="image/x-icon" href="{{ base_path }}/assets/favicon/favicon.ico?v=20260502">
    <link rel="stylesheet" href="{{ base_path }}/assets/css/joseki.css?v=20260504">
    <script src="{{ base_path }}/assets/js/board-thumbnail.js?v=20260504"></script>
    <script src="{{ base_path }}/assets/js/joseki-board.js?v=20260504"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="joseki-container">
        <header class="joseki-header">
            <h1>📚 定式探索</h1>
        </header>

        <!-- 标签页 -->
        <div class="joseki-card">
            <div class="joseki-tabs">
                <button class="joseki-tab active" data-tab="explore">探索</button>
                <button class="joseki-tab" data-tab="favorites">收藏</button>
            </div>

            <!-- 探索标签 -->
            <div id="exploreTab" class="joseki-tab-content active">
                <!-- 棋盘 -->
                <div class="joseki-board-wrapper">
                    <canvas id="exploreBoard" class="joseki-board"></canvas>
                </div>

                <!-- 指标数据 -->
                <div class="joseki-stats" id="exploreStats">
                    <div class="stat">
                        <span class="stat-value" id="statMoves">0</span>
                        <span class="stat-label">手数</span>
                    </div>
                    <div class="stat">
                        <span class="stat-value" id="statFreq">-</span>
                        <span class="stat-label">出现次数</span>
                    </div>
                    <div class="stat">
                        <span class="stat-value" id="statProb">-</span>
                        <span class="stat-label">出现概率</span>
                    </div>
                </div>

                <!-- 功能按钮 -->
                <div class="joseki-controls" id="exploreControls">
                    <button class="joseki-btn" id="prevBtn" disabled>◀ 上一步</button>
                    <button class="joseki-btn" id="nextBtn" disabled>▶ 下一步</button>
                    <button class="joseki-btn secondary" id="passBtn" disabled>脱先</button>
                    <button class="joseki-btn secondary" id="favBtn">⭐ 收藏</button>
                    <button class="joseki-btn secondary" id="resetBtn">重置</button>
                </div>

                <!-- 提示 -->
                <div class="joseki-message info" id="exploreTip">
                    正在加载数据...
                </div>
            </div>

            <!-- 收藏标签 -->
            <div id="favoritesTab" class="joseki-tab-content" style="display:none;">
                <div class="joseki-controls" style="justify-content:flex-end; margin-bottom:12px;">
                    <button class="joseki-btn secondary" id="importFavBtn">导入</button>
                    <button class="joseki-btn secondary" id="exportFavBtn">导出</button>
                </div>

                <div id="favoritesCount" style="text-align:center; color:#666; margin-bottom:12px;">
                    已收藏: <strong>0</strong> 条定式
                </div>

                <div id="favoritesGrid" class="joseki-grid">
                    <!-- 动态填充 -->
                </div>

                <div id="favoritesPagination" class="joseki-pagination" style="display:none;">
                    <button class="joseki-btn secondary" id="favPrevPage">◀</button>
                    <span id="favPageInfo">1/1</span>
                    <button class="joseki-btn secondary" id="favNextPage">▶</button>
                </div>

                <div id="favoritesEmpty" class="joseki-empty">
                    <div class="icon">📭</div>
                    <p>暂无收藏</p>
                    <p style="font-size:0.85em;">探索定式时点击收藏按钮添加</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 导入弹框 -->
    <div id="importModal" class="joseki-modal">
        <div class="joseki-modal-content">
            <h3>导入收藏</h3>
            <p style="margin-bottom:16px; color:#666;">粘贴导出的JSON数据</p>
            <textarea id="importData" style="width:100%; height:120px; border:2px solid #e0e0e0; border-radius:8px; padding:8px; font-size:12px;"></textarea>
            <div class="joseki-modal-buttons">
                <button class="joseki-btn secondary" id="importCancel">取消</button>
                <button class="joseki-btn" id="importConfirm">导入</button>
            </div>
        </div>
    </div>

    <script>
        // ========== 数据加载 ==========
        const DATA_PATH = '{{ base_path }}/assets/data/joseki';
        
        let trieIndex = null;
        let currentBucket = null;
        let currentNodePath = [];
        let currentMoves = [];
        let currentIndex = 0;
        let favorites = [];

        // 加载索引
        async function loadIndex() {
            console.log('[JosekiExplore] 开始加载索引:', `${DATA_PATH}/trie-index.json.gz`);
            try {
                const response = await fetch(`${DATA_PATH}/trie-index.json.gz`);
                console.log('[JosekiExplore] 索引响应状态:', response.status);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const compressed = await response.arrayBuffer();
                console.log('[JosekiExplore] 索引文件大小:', compressed.byteLength, 'bytes');
                
                const decompressed = pako.ungzip(compressed, { to: 'string' });
                trieIndex = JSON.parse(decompressed);
                
                console.log('[JosekiExplore] 索引加载完成');
                console.log('[JosekiExplore] 首着列表:', Object.keys(trieIndex.firstMoves));
                console.log('[JosekiExplore] 分桶数:', Object.keys(trieIndex.bucketIndex).length);
                
                // 显示首着选点
                showFirstMoveBranches();
                document.getElementById('exploreTip').textContent = '点击选点开始探索';
                
            } catch (e) {
                console.error('[JosekiExplore] 索引加载失败:', e);
                document.getElementById('exploreTip').textContent = '数据加载失败: ' + e.message;
                document.getElementById('exploreTip').classList.remove('info');
                document.getElementById('exploreTip').classList.add('error');
            }
        }

        // 显示首着选点
        function showFirstMoveBranches() {
            if (!trieIndex || !trieIndex.firstMoves) {
                console.log('[JosekiExplore] showFirstMoveBranches: 无索引数据');
                return;
            }
            
            const firstMoves = Object.keys(trieIndex.firstMoves);
            console.log('[JosekiExplore] 首着数量:', firstMoves.length);
            console.log('[JosekiExplore] 首着列表:', firstMoves.slice(0, 10));
            
            if (!board) {
                console.error('[JosekiExplore] board 未初始化！');
                return;
            }
            
            const branches = firstMoves.map(sgf => ({
                ...JosekiUtils.sgfToCoord(sgf),
                color: 'black',  // 首着都是黑棋
                sgf: sgf
            })).filter(b => !b.isPass);
            
            console.log('[JosekiExplore] branches 数量:', branches.length);
            console.log('[JosekiExplore] branches 前5个:', branches.slice(0, 5));
            console.log('[JosekiExplore] board 状态:', board ? '已初始化' : '未初始化');
            
            // 注意顺序：先 setMoves 清空棋盘，再 setBranches 设置选点
            // 因为 setMoves 会清空 branches
            board.setMoves([]);  // 清空棋盘
            console.log('[JosekiExplore] 调用 board.setBranches');
            board.setBranches(branches);
            
            console.log('[JosekiExplore] setBranches 完成，board.branches:', board.branches.length);
        }
        
        // 获取首着对应的二着列表
        function getSecondMoves(firstMove) {
            if (!trieIndex || !trieIndex.secondMoves || !trieIndex.secondMoves[firstMove]) {
                return [];
            }
            return trieIndex.secondMoves[firstMove];
        }

        // 加载分桶
        async function loadBucket(bucketKey) {
            console.log('[JosekiExplore] 加载分桶:', bucketKey);
            try {
                const bucketInfo = trieIndex.bucketIndex[bucketKey];
                if (!bucketInfo) {
                    console.error('[JosekiExplore] 分桶不存在:', bucketKey);
                    return null;
                }
                
                const url = `${DATA_PATH}/buckets/${bucketInfo.file}`;
                console.log('[JosekiExplore] 分桶URL:', url);
                
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const compressed = await response.arrayBuffer();
                console.log('[JosekiExplore] 分桶文件大小:', compressed.byteLength, 'bytes');
                
                const decompressed = pako.ungzip(compressed, { to: 'string' });
                const data = JSON.parse(decompressed);
                console.log('[JosekiExplore] 分桶加载完成:', data.prefix, '节点数:', Object.keys(data.nodes).length);
                
                return data;
            } catch (e) {
                console.error('[JosekiExplore] 分桶加载失败:', bucketKey, e);
                return null;
            }
        }

        // ========== 棋盘初始化 ==========
        let board = null;
        
        function initBoard() {
            const canvas = document.getElementById('exploreBoard');
            const size = Math.min(canvas.parentElement.clientWidth, 400);
            canvas.width = size;
            canvas.height = size;
            
            board = new JosekiBoard(canvas);
            
            // 点击事件
            canvas.addEventListener('click', handleBoardClick);
            canvas.addEventListener('touchend', handleBoardClick);
        }

        function handleBoardClick(e) {
            e.preventDefault();
            const rect = e.target.getBoundingClientRect();
            let clientX, clientY;
            
            if (e.type === 'touchend') {
                const touch = e.changedTouches[0];
                clientX = touch.clientX;
                clientY = touch.clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            const canvasX = (clientX - rect.left) * (e.target.width / rect.width);
            const canvasY = (clientY - rect.top) * (e.target.height / rect.height);
            
            const coord = board.canvasToSgf(canvasX, canvasY);
            console.log('[JosekiExplore] 点击坐标:', coord);
            
            if (!coord) return;
            
            handleMove(coord.sgf);
        }

        // ========== 着法处理 ==========
        async function handleMove(coord) {
            console.log('[JosekiExplore] 处理着法:', coord, '当前路径:', currentNodePath);
            
            if (!trieIndex) {
                document.getElementById('exploreTip').textContent = '数据未加载完成';
                return;
            }

            // === 首着选择 ===
            if (currentNodePath.length === 0) {
                const firstMoveBuckets = trieIndex.firstMoves[coord];
                console.log('[JosekiExplore] 首着分桶:', coord, firstMoveBuckets);
                
                if (!firstMoveBuckets || firstMoveBuckets.length === 0) {
                    document.getElementById('exploreTip').textContent = '该位置没有定式';
                    return;
                }

                // 从 secondMoves 获取二着选点
                const secondMovesData = trieIndex.secondMoves[coord] || [];
                console.log('[JosekiExplore] 二着列表:', secondMovesData.slice(0, 10));
                
                // 添加首着
                const coordData = JosekiUtils.sgfToCoord(coord);
                currentMoves = [{ 
                    x: coordData.x, 
                    y: coordData.y, 
                    color: 'black', 
                    num: 1 
                }];
                currentIndex = 1;
                currentNodePath = [coord];

                // 显示二着选点（注意：先 setMoves 再 setBranches，因为 setMoves 会清空 branches）
                board.setMoves(currentMoves, currentIndex);
                
                if (secondMovesData.length > 0) {
                    const branches = secondMovesData.slice(0, 20).map(sm => {
                        const smData = JosekiUtils.sgfToCoord(sm.coord);
                        return {
                            ...smData,
                            color: 'white',
                            sgf: sm.coord,
                            count: sm.count
                        };
                    });
                    board.setBranches(branches);
                    document.getElementById('passBtn').disabled = !secondMovesData.some(sm => sm.coord === 'tt');
                } else {
                    board.setBranches([]);
                    document.getElementById('passBtn').disabled = true;
                }
                updateStats({ moves: 1 });
                updateControls();
                document.getElementById('exploreTip').textContent = '选择二着继续探索';

                return;
            }

            // === 二着选择 ===
            if (currentNodePath.length === 1) {
                const bucketKey = currentNodePath[0] + '-' + coord;
                console.log('[JosekiExplore] 二着，加载分桶:', bucketKey);
                
                const bucketInfo = trieIndex.bucketIndex[bucketKey];
                if (!bucketInfo) {
                    document.getElementById('exploreTip').textContent = '该组合没有定式';
                    return;
                }
                
                currentBucket = await loadBucket(bucketKey);
                if (!currentBucket) {
                    document.getElementById('exploreTip').textContent = '数据加载失败';
                    return;
                }
                
                // 添加二着
                const coordData = JosekiUtils.sgfToCoord(coord);
                currentMoves.push({
                    x: coordData.x,
                    y: coordData.y,
                    isPass: coordData.isPass,
                    color: 'white',
                    num: 2
                });
                currentIndex = 2;
                currentNodePath.push(coord);
                
                // 从分桶根节点获取三着选点（先 setMoves 再 setBranches）
                board.setMoves(currentMoves, currentIndex);
                
                const rootNode = currentBucket.nodes['root'];
                console.log('[JosekiExplore] 分桶根节点children:', rootNode ? rootNode.children : 'null');
                
                if (rootNode && rootNode.children && rootNode.children.length > 0) {
                    const branches = rootNode.children.map(c => {
                        const cData = JosekiUtils.sgfToCoord(c);
                        return {
                            ...cData,
                            color: 'black',
                            sgf: c,
                            isPass: c === 'tt'
                        };
                    });
                    board.setBranches(branches);
                    document.getElementById('passBtn').disabled = !rootNode.children.includes('tt');
                } else {
                    board.setBranches([]);
                    document.getElementById('passBtn').disabled = true;
                    if (rootNode && rootNode.leaf) {
                        updateStats({ moves: rootNode.moves, freq: rootNode.total_freq });
                        document.getElementById('exploreTip').textContent = '定式完成！';
                    }
                }
                updateStats({ moves: 2 });
                updateControls();
                document.getElementById('exploreTip').textContent = '选择三着继续探索';
                
                return;
            }

            // 后续着法
            const bucketKey = currentNodePath.slice(0, 2).join('-');
            
            if (!currentBucket || currentBucket.prefix !== bucketKey) {
                currentBucket = await loadBucket(bucketKey);
            }

            if (!currentBucket) {
                document.getElementById('exploreTip').textContent = '数据加载失败';
                return;
            }

            // 获取当前节点key
            const nodeKey = currentNodePath.slice(2).join('-') || 'root';
            const nodeData = currentBucket.nodes[nodeKey];
            
            console.log('[JosekiExplore] 当前节点:', nodeKey, 'children:', nodeData ? nodeData.children : 'null');
            
            if (!nodeData || !nodeData.children || !nodeData.children.includes(coord)) {
                document.getElementById('exploreTip').textContent = '不是有效选点';
                return;
            }

            // 更新路径和棋盘
            currentNodePath.push(coord);
            const nextColor = currentNodePath.length % 2 === 1 ? 'black' : 'white';
            const coordData = JosekiUtils.sgfToCoord(coord);
            
            currentMoves.push({
                x: coordData.x,
                y: coordData.y,
                isPass: coordData.isPass,
                color: nextColor,
                num: currentNodePath.length
            });
            currentIndex = currentMoves.length;

            // 获取下一个节点的分支（先 setMoves 再 setBranches）
            board.setMoves(currentMoves, currentIndex);
            
            const nextNodeKey = currentNodePath.slice(2).join('-');
            const nextNodeData = currentBucket.nodes[nextNodeKey];
            
            console.log('[JosekiExplore] 下一节点:', nextNodeKey, 'data:', nextNodeData);
            
            if (nextNodeData && nextNodeData.children && !nextNodeData.leaf) {
                const branches = nextNodeData.children.map(c => ({
                    ...JosekiUtils.sgfToCoord(c),
                    color: currentNodePath.length % 2 === 0 ? 'black' : 'white',
                    isPass: c === 'tt',
                    sgf: c
                }));
                board.setBranches(branches);
                
                const hasPass = nextNodeData.children.includes('tt');
                document.getElementById('passBtn').disabled = !hasPass;
            } else {
                board.setBranches([]);
                document.getElementById('passBtn').disabled = true;
            }

            // 更新统计
            if (nextNodeData && nextNodeData.leaf) {
                updateStats({
                    moves: nextNodeData.moves,
                    freq: nextNodeData.total_freq || nextNodeData.freq
                });
                document.getElementById('exploreTip').textContent = '定式完成！';
            } else {
                updateStats({ moves: currentIndex });
                document.getElementById('exploreTip').textContent = `第 ${currentIndex} 手`;
            }

            updateControls();
        }

        // ========== UI更新 ==========
        function updateStats(data) {
            document.getElementById('statMoves').textContent = data.moves || 0;
            document.getElementById('statFreq').textContent = data.freq ? JosekiUtils.formatFreq(data.freq) : '-';
            document.getElementById('statProb').textContent = data.prob ? JosekiUtils.formatProb(data.prob) : '-';
        }

        function updateControls() {
            document.getElementById('prevBtn').disabled = currentIndex <= 0;
            document.getElementById('nextBtn').disabled = currentIndex >= currentMoves.length;
            document.getElementById('favBtn').disabled = currentIndex < 2;
        }

        function goTo(index) {
            if (index < 0 || index > currentMoves.length) return;
            currentIndex = index;
            board.goTo(index);
            updateControls();
            updateStats({ moves: index });
        }

        // ========== 收藏功能 ==========
        function loadFavorites() {
            try {
                const saved = localStorage.getItem('joseki_favorites');
                favorites = saved ? JSON.parse(saved) : [];
            } catch (e) {
                favorites = [];
            }
            renderFavorites();
        }

        function saveFavorites() {
            localStorage.setItem('joseki_favorites', JSON.stringify(favorites));
        }

        function addFavorite() {
            if (currentMoves.length < 2) return;
            
            const path = currentMoves.map(m => {
                if (m.isPass) return 'tt';
                return String.fromCharCode(97 + m.x, 97 + m.y);
            }).join('-');

            if (favorites.some(f => f.path === path)) {
                document.getElementById('exploreTip').textContent = '已收藏';
                return;
            }

            favorites.push({
                path: path,
                moves: currentMoves.length,
                freq: parseInt(document.getElementById('statFreq').textContent.replace('K', '000')) || 0,
                date: new Date().toISOString().split('T')[0]
            });

            saveFavorites();
            document.getElementById('exploreTip').textContent = '已收藏 ⭐';
        }

        let favPage = 0;
        const FAV_PER_PAGE = 12;

        function renderFavorites() {
            const count = favorites.length;
            document.getElementById('favoritesCount').innerHTML = `已收藏: <strong>${count}</strong> 条定式`;
            
            if (count === 0) {
                document.getElementById('favoritesGrid').innerHTML = '';
                document.getElementById('favoritesEmpty').style.display = 'block';
                document.getElementById('favoritesPagination').style.display = 'none';
                return;
            }

            document.getElementById('favoritesEmpty').style.display = 'none';

            const totalPages = Math.ceil(count / FAV_PER_PAGE);
            favPage = Math.min(favPage, totalPages - 1);

            const start = favPage * FAV_PER_PAGE;
            const items = favorites.slice(start, start + FAV_PER_PAGE);

            const grid = document.getElementById('favoritesGrid');
            grid.innerHTML = '';

            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'joseki-item';
                div.innerHTML = `
                    <canvas width="100" height="100"></canvas>
                    <div class="item-info">
                        <div class="item-moves">${item.moves}手</div>
                        <div>${JosekiUtils.formatFreq(item.freq)}次</div>
                        <div class="item-actions">
                            <button class="joseki-btn secondary" onclick="deleteFavorite('${item.path}')">删除</button>
                        </div>
                    </div>
                `;
                
                const canvas = div.querySelector('canvas');
                const moves = JosekiUtils.parseMoves(item.path.split('-'));
                BoardThumbnail.render(canvas, moves);
                
                grid.appendChild(div);
            });

            if (totalPages > 1) {
                document.getElementById('favoritesPagination').style.display = 'flex';
                document.getElementById('favPageInfo').textContent = `${favPage + 1}/${totalPages}`;
                document.getElementById('favPrevPage').disabled = favPage === 0;
                document.getElementById('favNextPage').disabled = favPage >= totalPages - 1;
            } else {
                document.getElementById('favoritesPagination').style.display = 'none';
            }
        }

        function deleteFavorite(path) {
            favorites = favorites.filter(f => f.path !== path);
            saveFavorites();
            renderFavorites();
        }

        function exportFavorites() {
            const data = JSON.stringify(favorites, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `joseki-favorites-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function importFavorites() {
            const data = document.getElementById('importData').value;
            try {
                const imported = JSON.parse(data);
                if (Array.isArray(imported)) {
                    favorites = [...favorites, ...imported];
                    saveFavorites();
                    renderFavorites();
                    document.getElementById('importModal').classList.remove('show');
                    document.getElementById('importData').value = '';
                }
            } catch (e) {
                alert('导入失败：数据格式错误');
            }
        }

        // ========== 标签切换 ==========
        function switchTab(tabName) {
            document.querySelectorAll('.joseki-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
            
            document.getElementById('exploreTab').style.display = tabName === 'explore' ? 'block' : 'none';
            document.getElementById('favoritesTab').style.display = tabName === 'favorites' ? 'block' : 'none';
            
            if (tabName === 'favorites') {
                renderFavorites();
            }
        }

        // ========== 事件绑定 ==========
        document.querySelectorAll('.joseki-tab').forEach(tab => {
            tab.addEventListener('click', () => switchTab(tab.dataset.tab));
        });

        document.getElementById('prevBtn').addEventListener('click', () => goTo(currentIndex - 1));
        document.getElementById('nextBtn').addEventListener('click', () => goTo(currentIndex + 1));
        document.getElementById('passBtn').addEventListener('click', () => handleMove('tt'));
        document.getElementById('favBtn').addEventListener('click', addFavorite);
        document.getElementById('resetBtn').addEventListener('click', () => {
            currentMoves = [];
            currentIndex = 0;
            currentNodePath = [];
            currentBucket = null;
            board.setMoves([]);
            showFirstMoveBranches();
            updateStats({});
            updateControls();
            document.getElementById('exploreTip').textContent = '点击选点开始探索';
            document.getElementById('passBtn').disabled = true;
        });

        document.getElementById('favPrevPage').addEventListener('click', () => { favPage--; renderFavorites(); });
        document.getElementById('favNextPage').addEventListener('click', () => { favPage++; renderFavorites(); });
        document.getElementById('exportFavBtn').addEventListener('click', exportFavorites);
        document.getElementById('importFavBtn').addEventListener('click', () => {
            document.getElementById('importModal').classList.add('show');
        });
        document.getElementById('importCancel').addEventListener('click', () => {
            document.getElementById('importModal').classList.remove('show');
        });
        document.getElementById('importConfirm').addEventListener('click', importFavorites);

        // ========== 初始化 ==========
        function init() {
            console.log('[JosekiExplore] 初始化开始');
            initBoard();
            loadFavorites();
            loadIndex();
        }

        // 加载 pako（gzip解压）
        if (!window.pako) {
            console.log('[JosekiExplore] 加载 pako 库');
            const script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js';
            script.onload = () => {
                console.log('[JosekiExplore] pako 加载完成');
                init();
            };
            script.onerror = () => {
                console.error('[JosekiExplore] pako 加载失败');
                document.getElementById('exploreTip').textContent = '依赖库加载失败';
            };
            document.head.appendChild(script);
        } else {
            init();
        }
    </script>
</body>
</html>
