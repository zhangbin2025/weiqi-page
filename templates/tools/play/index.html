<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>围棋对弈</title>
    <link rel="icon" type="image/x-icon" href="{{ base_path }}/assets/favicon/favicon.ico?v=20260502">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            padding: 12px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 12px 10px 8px;
            color: white;
        }

        .header-top {
            text-align: center;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 1.8em;
            margin-bottom: 4px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4px;
        }

        .subtitle {
            font-size: 0.75em;
            padding: 2px 10px;
            background: rgba(255,255,255,0.15);
            border-radius: 10px;
        }

        .history-btn {
            background: transparent;
            border: none;
            padding: 4px;
            font-size: 1.4em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
            text-decoration: none;
        }

        .history-btn:hover {
            transform: scale(1.1);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: 12px;
            margin-top: 12px;
        }

        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: white;
            border: none;
            border-radius: 12px;
            padding: 16px 12px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            text-decoration: none;
            color: #333;
        }

        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .nav-btn:active {
            transform: translateY(-1px);
        }

        .nav-btn .icon {
            font-size: 1.5em;
            margin-bottom: 8px;
        }

        .nav-btn .title {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 4px;
            color: #333;
        }

        .nav-btn .desc {
            font-size: 0.8em;
            color: #666;
            text-align: center;
            line-height: 1.4;
        }

        footer {
            text-align: center;
            padding: 10px;
            color: rgba(255,255,255,0.7);
            font-size: 0.7em;
            margin-top: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <h1>🎮 围棋对弈</h1>
            </div>
            <div class="header-bottom">
                <span class="subtitle">与 KataGo AI 对弈</span>
                <a href="history.html" class="history-btn" title="历史对局">
                    <span>📋</span>
                </a>
            </div>
        </header>

        <div class="main-content">
            <a href="hh.html" class="nav-btn">
                <div class="icon">👥</div>
                <div class="title">真人对弈</div>
                <div class="desc">创建房间邀请好友，P2P 直连实时对弈</div>
            </a>

            <a href="hm.html" class="nav-btn">
                <div class="icon">🎯</div>
                <div class="title">人机对弈</div>
                <div class="desc">选择执黑执白，与 KataGo AI 对弈</div>
            </a>

            <a href="mm.html" class="nav-btn">
                <div class="icon">🤖</div>
                <div class="title">AI 自对弈</div>
                <div class="desc">观看 AI 实战，学习 AI 棋路</div>
            </a>
        </div>

        <footer>
            <p>自动保存棋谱 · 支持导出 SGF</p>
        </footer>
    </div>
</body>
</html>
