<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>围棋对弈</title>
    <link rel="icon" type="image/x-icon" href="{{ base_path }}/assets/favicon/favicon.ico?v=20260502">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            color: white;
            padding: 20px 0 30px;
        }

        h1 {
            font-size: 2em;
            margin-bottom: 8px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header-row {
            display: flex;
            justify-content: flex-end;
            margin-top: 4px;
        }

        .history-btn {
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
            text-decoration: none;
        }

        .history-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .history-btn .icon {
            font-size: 20px;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: white;
            border: none;
            border-radius: 16px;
            padding: 28px 24px;
            margin-bottom: 16px;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            color: #333;
        }

        .nav-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.2);
        }

        .nav-btn:active {
            transform: translateY(-2px);
        }

        .nav-btn .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .nav-btn .title {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 6px;
            color: #333;
        }

        .nav-btn .desc {
            font-size: 0.85em;
            color: #666;
            text-align: center;
            line-height: 1.4;
        }

        @media (max-width: 400px) {
            .nav-btn {
                padding: 32px 24px;
            }
            .nav-btn .icon {
                font-size: 48px;
            }
            .nav-btn .title {
                font-size: 1.3em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 围棋对弈</h1>
            <div class="header-row">
                <a href="history.html" class="history-btn" title="历史对局">
                    <span class="icon">📋</span>
                </a>
            </div>
        </header>

        <div class="main-content">
            <a href="hh.html" class="nav-btn">
                <div class="icon">👥</div>
                <div class="title">真人对弈</div>
                <div class="desc">创建房间邀请好友<br>P2P 直连实时对弈</div>
            </a>

            <a href="hm.html" class="nav-btn">
                <div class="icon">🎯</div>
                <div class="title">人机对弈</div>
                <div class="desc">选择执黑执白<br>与 KataGo AI 对弈</div>
            </a>

            <a href="mm.html" class="nav-btn">
                <div class="icon">🤖</div>
                <div class="title">AI 自对弈</div>
                <div class="desc">观看 AI 实战<br>学习 AI 棋路</div>
            </a>
        </div>
    </div>
</body>
</html>
